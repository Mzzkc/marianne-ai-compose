    {# MACROS                                                                 #}
    {# ═══════════════════════════════════════════════════════════════════════ #}

    {% macro save_to(filename) %}

    ---
    **Save result to:** {{ workspace }}/{{ filename }}
    Include `COMPLETE: yes` at the top of the file.
    Summarize what you built, what pages now render, and any issues remaining.
    {% endmacro %}

    {% macro verify_pages(pages) %}
    ## Verify Your Work

    Start the dashboard and check every page you built renders correctly:
    ```bash
    cd /home/emzi/Projects/mozart-ai-compose
    timeout 15 .venv/bin/python3 -c "
    import subprocess, time, sys, urllib.request
    p = subprocess.Popen(
        [sys.executable, '-m', 'uvicorn', 'mozart.dashboard.app:create_app',
         '--factory', '--port', '18923', '--host', '127.0.0.1'],
        stdout=subprocess.DEVNULL, stderr=subprocess.DEVNULL)
    time.sleep(3)
    try:
        for path in {{ pages }}:
            try:
                r = urllib.request.urlopen(f'http://127.0.0.1:18923{path}', timeout=5)
                print(f'  OK: {path} → {r.status} ({len(r.read())} bytes)')
            except Exception as e:
                print(f'  FAIL: {path} → {e}')
    finally:
        p.terminate(); p.wait()
    "
    ```

    If ANY page fails, read the error, fix the template, and re-verify.
    Do NOT finish this stage with broken pages.
    {% endmacro %}

