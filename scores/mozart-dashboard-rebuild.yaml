# ╔══════════════════════════════════════════════════════════════════════════════╗
# ║              MOZART DASHBOARD REBUILD                                       ║
# ║                                                                             ║
# ║  Tears down the broken frontend and rebuilds it page by page with          ║
# ║  HTTP rendering verification at every stage. Backend stays untouched.      ║
# ║                                                                             ║
# ║  The previous concert produced blind code — templates/CSS/JS that were     ║
# ║  never rendered in a browser. This score fixes that: every page-building   ║
# ║  stage starts the dashboard and verifies the page returns valid HTML.      ║
# ║                                                                             ║
# ║  Structure (9 sequential stages):                                           ║
# ║    Stage 1:  Teardown + Foundation (delete old frontend, create base)      ║
# ║    Stage 2:  Dashboard Overview page                                        ║
# ║    Stage 3:  Jobs List + Job Detail pages                                  ║
# ║    Stage 4:  Job Logs page                                                  ║
# ║    Stage 5:  System Monitor page                                            ║
# ║    Stage 6:  Score Editor + Templates pages                                ║
# ║    Stage 7:  Cross-page polish (nav, dark mode, empty/error states)        ║
# ║    Stage 8:  Full verification + fix                                        ║
# ║    Stage 9:  Commit + push                                                  ║
# ║                                                                             ║
# ║  Usage:                                                                     ║
# ║    cd ~/Projects/mozart-ai-compose                                          ║
# ║    mozart start                                                             ║
# ║    mozart run scores/mozart-dashboard-rebuild.yaml                         ║
# ╚══════════════════════════════════════════════════════════════════════════════╝

name: "mozart-dashboard-rebuild"
description: "Tear down and rebuild dashboard frontend with rendering verification at every stage"

workspace: "/home/emzi/Projects/mozart-ai-compose/dashboard-rebuild-workspace"

workspace_lifecycle:
  archive_on_fresh: true
  max_archives: 3

backend:
  type: claude_cli
  skip_permissions: true
  disable_mcp: true
  working_directory: /home/emzi/Projects/mozart-ai-compose
  timeout_seconds: 3600
  output_format: json

sheet:
  size: 1
  total_items: 9

  dependencies:
    2: [1]
    3: [2]
    4: [3]
    5: [4]
    6: [5]
    7: [6]
    8: [7]
    9: [8]

  prelude:
    - file: /home/emzi/Projects/mozart-ai-compose/docs/plans/2026-02-23-dashboard-concert-overhaul-design.md
      as: context

parallel:
  enabled: false

cross_sheet:
  auto_capture_stdout: true
  max_output_chars: 3000
  lookback_sheets: 2

retry:
  max_retries: 2
  max_completion_attempts: 2
  completion_threshold_percent: 50

stale_detection:
  enabled: true
  idle_timeout_seconds: 1800

cost_limits:
  max_cost_per_sheet: 12.0

prompt:
  variables:
    preamble: |
      ╔══════════════════════════════════════════════════════════════════════════╗
      ║  MOZART DASHBOARD REBUILD                                              ║
      ║  Tearing down blind code. Building pages you can actually see.         ║
      ╚══════════════════════════════════════════════════════════════════════════╝

      **Project:** /home/emzi/Projects/mozart-ai-compose
      **Branch:** main (push directly)
      **Tech:** FastAPI + Jinja2 + htmx 2.0 + Alpine.js 3.x + Tailwind CDN
      **Scope:** `src/mozart/dashboard/templates/`, `static/css/`, `static/js/`

      **THE BACKEND IS SOLID. DO NOT MODIFY:**
      - `src/mozart/dashboard/app.py` — app factory (keep as-is)
      - `src/mozart/dashboard/routes/` — all route handlers (keep as-is)
      - `src/mozart/dashboard/services/` — SSE manager, job control (keep as-is)
      - `src/mozart/dashboard/auth/` — middleware (keep as-is)
      - `tests/test_dashboard*.py` — test suite (keep as-is)

      **YOU MUST REBUILD:**
      - `src/mozart/dashboard/templates/` — all templates (pages, partials, components)
      - `src/mozart/dashboard/static/css/main.css` — stylesheet
      - `src/mozart/dashboard/static/js/app.js` — Alpine.js application
      - Keep `src/mozart/dashboard/static/codemirror/` (bundled library)

      CRITICAL RULES:
      1. READ the route handlers before building templates. They pass specific
         context variables — your templates must use the same variable names.
      2. Every template you create MUST render without errors. After building,
         start the dashboard and load the page to verify.
      3. Use pinned CDN versions (specified below). Do NOT use unpinned @latest.
      4. Tailwind utility classes for styling. Minimal custom CSS.
      5. htmx for dynamic updates. Alpine.js for client-side state only.

      CDN VERSIONS (use exactly these):
      - Tailwind: https://cdn.tailwindcss.com/3.4.17
      - htmx: https://unpkg.com/htmx.org@2.0.4
      - htmx SSE extension: https://unpkg.com/htmx-ext-sse@2.3.0/sse.js
      - Alpine.js: https://cdn.jsdelivr.net/npm/alpinejs@3.14.8/dist/cdn.min.js

      RENDERING VERIFICATION:
      After building templates, verify they render by running:
      ```bash
      cd /home/emzi/Projects/mozart-ai-compose
      timeout 15 .venv/bin/python3 -c "
      import subprocess, time, sys, urllib.request
      p = subprocess.Popen(
          [sys.executable, '-m', 'uvicorn', 'mozart.dashboard.app:create_app',
           '--factory', '--port', '18923', '--host', '127.0.0.1'],
          stdout=subprocess.DEVNULL, stderr=subprocess.DEVNULL)
      time.sleep(3)
      try:
          for path in ['/', '/jobs', '/monitor', '/editor', '/templates']:
              r = urllib.request.urlopen(f'http://127.0.0.1:18923{path}', timeout=5)
              print(f'{path}: {r.status} ({len(r.read())} bytes)')
      finally:
          p.terminate(); p.wait()
      "
      ```
      Only check the pages YOU built in this stage. If a page returns 500,
      read the error and fix the template.

    # Template names expected by routes (from pages.py) — agents MUST match these
    route_templates: |
      PAGES (routes/pages.py):
        GET /                    → pages/index.html          ctx: {request}
        GET /jobs                → pages/jobs_list.html      ctx: {request}
        GET /jobs/{id}/details   → pages/job_detail.html     ctx: {request, job: JobDetail}
        GET /jobs/{id}/logs      → pages/job_logs.html       ctx: {request, job: JobDetail}
        GET /monitor             → pages/monitor.html        ctx: {request}
        GET /templates           → pages/templates.html      ctx: {request}
        GET /editor              → pages/score_editor.html   ctx: {request}

      PARTIALS (routes/pages.py, routes/dashboard.py):
        GET /jobs/list                   → partials/jobs_list_content.html   ctx: {request, jobs, total_jobs, ...}
        GET /api/dashboard/stats/partial → partials/dashboard_stats.html     ctx: {request, stats: DashboardStats}
        GET /api/dashboard/recent/partial → partials/recent_activity.html    ctx: {request, jobs: [JobSummary]}
        GET /api/dashboard/system/partial → partials/system_resources.html   ctx: {request, system: {...}}
        GET /api/templates/list          → partials/templates_grid.html      ctx: {request, templates: [...]}
        Error fallback                   → partials/error_message.html       ctx: {request, error_title, error_message}

      READ the route handler code to see exact context variable shapes.
      READ routes/__init__.py for JobSummary, JobDetail, DashboardStats models.

  template: |
