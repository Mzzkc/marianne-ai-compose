    {% elif stage == 2 %}

    # Stage 2: Dashboard Overview Page

    Build the main landing page — the first thing users see when they open
    the dashboard. This must work with or without a running conductor.

    ## Read First

    Before writing any templates:
    1. Read `routes/dashboard.py` — understand the stats, recent jobs, and
       system resources API endpoints and what data they return
    2. Read `routes/__init__.py` — understand JobSummary, DashboardStats models
    3. Read the current `pages/index.html` (your placeholder from Stage 1)

    ## Build: pages/index.html

    The overview page layout:

    **Top row: Stats cards** (loaded via htmx from `/api/dashboard/stats/partial`)
    - Total jobs, Running, Completed, Failed, Success rate
    - Cards with icons, numbers, and trend indicators
    - Auto-refresh every 10 seconds: `hx-trigger="every 10s"`

    **Middle: Active jobs panel** (loaded via htmx from `/jobs/list?status=running`)
    - Table or card list of currently running jobs
    - Each job shows: name, progress (sheet X/Y), duration, status badge
    - Click to navigate to job detail page
    - Auto-refresh every 5 seconds

    **Bottom row:**
    - Left: Recent activity (loaded from `/api/dashboard/recent/partial`)
    - Right: System resources (loaded from `/api/dashboard/system/partial`)

    **Empty state:** When no jobs exist, show a helpful message with a link
    to the score editor ("Create your first score →").

    ## Build: partials/dashboard_stats.html

    Receives `stats` context with: total_jobs, running, completed, failed,
    success_rate. Render as a row of stat cards with Tailwind styling.

    ## Build: partials/recent_activity.html

    Receives `jobs` context (list of JobSummary). Render as a compact list
    showing job name, status badge, and time.

    ## Build: partials/system_resources.html

    Receives `system` context with memory, CPU, load averages. Render as
    gauge-style cards. Handle the case where system data is None (daemon
    not running).

    ## Build: components/status_badge.html

    Reusable status badge component. Include via Jinja2 macro or as a
    standalone partial. Colors: running=blue, completed=green, failed=red,
    paused=yellow, pending=gray.

    {{ verify_pages(["'/'"])  }}

