    {% if stage == 1 %}

    # Stage 1: Teardown + Foundation

    The previous dashboard frontend is broken beyond repair — templates crash,
    CSS is unstyled (no Tailwind loaded), JS references are wrong, Alpine.js
    bindings point to nonexistent stores. Tear it all down and build a clean
    foundation.

    ## Step 1: Delete Old Frontend

    Delete ALL files in these directories (but keep the directories):
    - `src/mozart/dashboard/templates/pages/` — delete all .html files
    - `src/mozart/dashboard/templates/partials/` — delete all .html files
    - `src/mozart/dashboard/templates/components/` — delete all .html files
    - `src/mozart/dashboard/templates/base.html` — delete

    Delete these files:
    - `src/mozart/dashboard/static/css/main.css`
    - `src/mozart/dashboard/static/js/app.js`

    **Keep:** `src/mozart/dashboard/static/codemirror/` (bundled library)

    ## Step 2: Create Foundation

    **base.html** — The master layout that all pages extend.
    - HTML5 doctype with `lang="en"`
    - `<head>`: meta charset, viewport, title block, Tailwind CDN, htmx, Alpine.js
    - Body with `x-data="mozartApp"` for Alpine.js root state
    - Include `components/header.html` for persistent navigation
    - `{% raw %}{% block content %}{% endblock %}{% endraw %}` for page content
    - Include `components/footer.html`
    - Load `static/js/app.js` before closing body
    - Dark mode support via class on `<html>` element

    **components/header.html** — Navigation bar
    - Mozart logo/name linking to /
    - Nav links: Dashboard (/), Jobs (/jobs), Monitor (/monitor),
      Templates (/templates), Editor (/editor)
    - Active page indicator (highlight current nav item)
    - Dark mode toggle button
    - Conductor status indicator (green/red dot)

    **components/footer.html** — Minimal footer
    - Mozart version, link to docs

    **static/css/main.css** — CSS custom properties and minimal overrides
    - CSS variables for colors (--color-primary, --color-success, etc.)
    - Dark mode variable overrides
    - Any styling that Tailwind utilities can't handle
    - Keep it SMALL — Tailwind should do 95% of the work

    **static/js/app.js** — Alpine.js application state
    - `mozartApp` component with:
      - `darkMode`: boolean, persisted to localStorage
      - `notifications`: array of {message, type, id}
      - `addNotification(message, type)`: add with auto-dismiss
      - `removeNotification(id)`: remove by id
    - Dark mode initialization from localStorage or system preference
    - HTMX event listeners for error handling

    **pages/index.html** — Placeholder overview page
    - Extends base.html
    - Shows "Dashboard" heading
    - Placeholder content: "Dashboard overview coming in Stage 2"
    - This ensures / returns 200 after teardown

    **partials/error_message.html** — Error display partial
    - Shows `error_title` and `error_message` from context
    - Styled with red/warning colors
    - Used by multiple route error handlers — MUST exist from Stage 1

    ## Step 3: Verify Foundation

    {{ verify_pages(["'/'"])  }}

    Also run:
    ```bash
    pytest tests/test_dashboard*.py -x -q --tb=short 2>&1 | tail -5
    python -c "from mozart.dashboard.app import create_app; print('OK')"
    ```

    {{ save_to("01-foundation.md") }}


