    # Stage 5: System Monitor Page

    The web equivalent of `mozart top`. Same data source, different interface.

    ## Read First

    1. Read `routes/monitor.py` — snapshot and stream endpoints
    2. Read `routes/pages.py` — monitor_page handler
    3. Read the design doc (injected above) for the monitor section

    ## Build: pages/monitor.html

    The monitoring dashboard:

    **Header bar:**
    - Conductor status (UP/DOWN with colored dot)
    - Memory usage, CPU load, daemon PID
    - Pressure level indicator (none/low/medium/high/critical)

    **Process tree:**
    - Jobs as collapsible groups
    - Under each job: active sheets with their processes
    - Show: PID, command (truncated), state, CPU%, memory (RSS), age
    - Group child processes under their parent using PPID data
    - Auto-refresh via SSE or polling: `/api/monitor/stream` or
      `/api/monitor/snapshot` every 3 seconds

    **System metrics:**
    - Memory: total, available, used (progress bar)
    - Load averages: 1m, 5m, 15m
    - GPU status if available

    **Empty state:** When conductor is not running, show a clear message:
    "Conductor is not running. Start it with: mozart start"

    Use htmx polling for updates:
    ```html
    <div hx-get="/api/monitor/snapshot" hx-trigger="every 3s"
         hx-swap="innerHTML">
      <!-- monitor content refreshed here -->
    </div>
    ```

    Note: The `/api/monitor/snapshot` endpoint returns JSON. You may need
    to create a partial that the page loads, or use Alpine.js to fetch
    JSON and render client-side. Choose whichever approach is cleaner.

