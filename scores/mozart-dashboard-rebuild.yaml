    # Stage 7: Cross-Page Polish

    All 6 pages exist. Now make them cohesive.

    ## Read Everything

    Read every template in `templates/pages/`, `templates/partials/`,
    `templates/components/`, plus `base.html`, `main.css`, and `app.js`.
    Understand the full picture before making changes.

    ## Polish Checklist

    1. **Navigation consistency.** Every page uses the same header with the
       same nav links. Active page MUST be highlighted. Verify by loading
       each page and checking the nav state.

    2. **Dark mode.** Toggle must work on every page. All Tailwind classes
       must have `dark:` variants where colors are used. Text, backgrounds,
       borders, cards — all must look good in both modes. Test by toggling.

    3. **Empty states.** Each page must handle zero data gracefully:
       - Overview: "No jobs yet. Create your first score →"
       - Jobs list: "No jobs match your filter"
       - Monitor: "Conductor is not running"
       - Templates: "No templates found"
       - Editor: Clean empty editor ready for input

    4. **Error states.** What happens when:
       - Daemon is not running (API calls fail)?
       - SSE connection drops?
       - A page loads with an invalid job ID?
       Each scenario needs a user-friendly message, not a raw error.

    5. **Loading states.** Every htmx request should show a loading indicator.
       Use `hx-indicator` with a consistent spinner or skeleton pattern.
       Define the indicator style in base.html or main.css.

    6. **Responsive layout.** Dashboard must be usable at 1280px and 1920px.
       Test by checking that content doesn't overflow or have horizontal
       scrollbars at those widths.

    7. **Breadcrumbs.** Detail pages (job detail, job logs) should show
       breadcrumb navigation: Dashboard > Jobs > {job name}.

    8. **Page titles.** Each page sets `<title>` via a template block:
       "Mozart - Dashboard", "Mozart - Jobs", etc.

    ## Verify Everything

