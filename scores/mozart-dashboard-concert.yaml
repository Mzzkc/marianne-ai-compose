# ╔══════════════════════════════════════════════════════════════════════════════╗
# ║              MOZART DASHBOARD CONCERT                                       ║
# ║                                                                             ║
# ║  Builds the Mozart web dashboard into an industry-grade command center.     ║
# ║  Three passes: Foundation → Features → Polish+Ship                         ║
# ║                                                                             ║
# ║  Design: docs/plans/2026-02-23-dashboard-concert-overhaul-design.md        ║
# ║                                                                             ║
# ║  Structure (17 stages, 25 expanded sheets):                                 ║
# ║                                                                             ║
# ║    ═══ PASS 1: FOUNDATION ═══                                              ║
# ║    Stage 1 (fan×3):  Investigate — bugs | architecture | feature gaps      ║
# ║    Stage 2:          Plan + synthesize                                      ║
# ║    Stage 3:          Execute foundation (pass 1)                            ║
# ║    Stage 4:          Execute foundation (pass 2 — refinement)              ║
# ║    Stage 5:          Code review                                            ║
# ║    Stage 6:          Fixup                                                  ║
# ║                                                                             ║
# ║    ═══ PASS 2: FEATURES ═══                                                ║
# ║    Stage 7 (fan×2):  Re-investigate — verify fixes | feature plan          ║
# ║    Stage 8 (fan×3):  Execute features — overview | monitoring | editor     ║
# ║    Stage 9:          Feature refinement (holistic pass)                     ║
# ║    Stage 10:         Code review                                            ║
# ║    Stage 11:         Fixup                                                  ║
# ║                                                                             ║
# ║    ═══ PASS 3: POLISH + SHIP ═══                                           ║
# ║    Stage 12:         Execute polish (pass 1)                                ║
# ║    Stage 13:         Execute polish (pass 2 — refinement)                  ║
# ║    Stage 14:         Code review                                            ║
# ║    Stage 15 (fan×3): Verify — tests | lint | integration                   ║
# ║    Stage 16:         Fixup                                                  ║
# ║    Stage 17:         Commit + push                                          ║
# ║                                                                             ║
# ║  Usage:                                                                     ║
# ║    cd ~/Projects/mozart-ai-compose                                          ║
# ║    mozart start                                                             ║
# ║    mozart run scores/mozart-dashboard-concert.yaml                         ║
# ╚══════════════════════════════════════════════════════════════════════════════╝

name: "mozart-dashboard-concert"
description: "Build the Mozart web dashboard into an industry-grade command center"

workspace: "./dashboard-concert-workspace"

workspace_lifecycle:
  archive_on_fresh: true
  max_archives: 5

backend:
  type: claude_cli
  skip_permissions: true
  disable_mcp: true
  working_directory: /home/emzi/Projects/mozart-ai-compose
  timeout_seconds: 3600
  output_format: json

sheet:
  size: 1
  total_items: 17

  fan_out:
    1: 3
    7: 2
    8: 3
    15: 3

  dependencies:
    2: [1]
    3: [2]
    4: [3]
    5: [4]
    6: [5]
    7: [6]
    8: [7]
    9: [8]
    10: [9]
    11: [10]
    12: [11]
    13: [12]
    14: [13]
    15: [14]
    16: [15]
    17: [16]

parallel:
  enabled: true
  max_concurrent: 3

cross_sheet:
  auto_capture_stdout: true
  max_output_chars: 4000
  lookback_sheets: 5

retry:
  max_retries: 2
  max_completion_attempts: 2
  completion_threshold_percent: 50

stale_detection:
  enabled: true
  idle_timeout_seconds: 1800  # 30min — verification stages run pytest/mypy/ruff as subprocesses

prompt:
  variables:
    preamble: |
      ╔══════════════════════════════════════════════════════════════════════════╗
      ║  MOZART DASHBOARD CONCERT                                              ║
      ║  Building the command center for operating Mozart at scale             ║
      ╚══════════════════════════════════════════════════════════════════════════╝

      **Project:** /home/emzi/Projects/mozart-ai-compose
      **Branch:** main (push directly)
      **Tech:** FastAPI + Jinja2 + htmx + SSE
      **Focus:** `src/mozart/dashboard/` — the web dashboard

      CRITICAL RULES:
      1. You are an engineer, not a transcription machine. These instructions
         describe OUTCOMES. Adapt your approach to what the codebase actually
         looks like when you read it.
      2. Follow existing code patterns — async, Pydantic v2, Protocol classes.
      3. All new code must have type hints.
      4. Never use `git add .` — stage files explicitly.
      5. Run `pytest tests/test_dashboard*.py -x -q` after significant changes.
      6. When in doubt, read the actual code before modifying it.

      DASHBOARD VISION:
      This dashboard is the command center for operating Mozart across an entire
      organization. It must be modular enough to extend easily and professional
      enough to trust with real workloads. Think: Grafana meets Airflow, not a
      toy status page.

      WHAT EXISTS (read these to understand the codebase):
      - `src/mozart/dashboard/app.py` — FastAPI app factory
      - `src/mozart/dashboard/routes/` — API routes (jobs, artifacts, stream, scores, monitor, pages)
      - `src/mozart/dashboard/services/` — SSE manager, job control
      - `src/mozart/dashboard/auth/` — 3-mode auth, security headers, rate limiter
      - `src/mozart/dashboard/templates/` — 20+ Jinja2 templates
      - `src/mozart/dashboard/static/` — CSS, JS, CodeMirror
      - `src/mozart/cli/commands/dashboard.py` — CLI command
      - `tests/test_dashboard*.py` — test suite

    investigation_focus:
      1:
        name: "Bug Inventory"
        directive: |
          Systematically find all bugs that would cause runtime failures.
          Read every route file, every service file, every template. Check:
          - Constructor/function signature mismatches between callers and callees
          - References to templates that don't exist on disk
          - URL routing issues (doubled prefixes, wrong paths)
          - Imports of modules that don't exist
          - Missing or broken middleware wiring
          Report each bug with: file, line, description, severity (crash/error/cosmetic).
      2:
        name: "Architecture Review"
        directive: |
          Understand the dashboard's architecture and identify structural issues.
          Map: route registration flow, middleware stack, state management pattern,
          how the dashboard connects to the daemon (IPC vs local), template
          inheritance/component structure, static asset pipeline.
          Identify: dead code, unused middleware, inconsistent patterns, missing
          error handling, technical debt worth addressing now vs later.
      3:
        name: "Feature Gap Analysis"
        directive: |
          Compare the current dashboard to what an industry-grade operations
          platform needs. Evaluate each existing page and identify:
          - What pages exist but are incomplete or non-functional
          - What pages are missing entirely (dashboard overview? monitoring?)
          - Where htmx could replace full page reloads
          - What real-time features need SSE connections
          - What management capabilities are missing (score templates, job presets)
          Think: what would an SRE or team lead need from this dashboard daily?

    reinvestigation_focus:
      1:
        name: "Fix Verification"
        directive: |
          Verify that Pass 1 actually fixed the bugs. Re-run the same checks
          from the bug inventory. For each bug found earlier: is it fixed?
          Are there new bugs introduced by the fixes? Do the tests pass?
          Also check: do the middleware changes (security headers, rate limiter)
          work correctly? Is htmx properly integrated?
      2:
        name: "Feature Planning"
        directive: |
          Based on the feature gap analysis and the now-fixed codebase, create
          a concrete plan for the three pages being built in parallel:
          1. Dashboard Overview — what cards, what data sources, what layout
          2. Monitoring Page — what metrics to show, how to consume SSE
          3. Score Editor — what validation feedback, what templates to offer
          For each: list the templates to create, routes to add/modify,
          htmx patterns to use, and data the page needs from the API.

    feature_focus:
      1:
        name: "Dashboard Overview"
        directive: |
          Build the main landing page — the first thing users see.
          This page should show at a glance: conductor status, active jobs
          with progress, recent completions/failures, system health metrics,
          and quick-action buttons (start job, view logs, open score editor).
          Use htmx for live updates — the job list should refresh without
          full page reloads. Consume the existing SSE endpoints.
          Create templates, routes, and any needed htmx partials.
      2:
        name: "Monitoring Page"
        directive: |
          Build the system monitoring page that consumes /api/monitor/stream
          and /api/monitor/snapshot. Display: system memory, CPU, process tree
          grouped by job, GPU status (if available), pressure level, recent
          events/anomalies. Use htmx + SSE to update metrics in real-time.
          This is the web equivalent of `mozart top` — same data, different UI.
          Create templates, routes, and htmx partials.
      3:
        name: "Score Editor"
        directive: |
          Improve the score editor page. Current state has a CodeMirror editor
          and validation endpoint. Enhance with: live validation feedback as
          you type (htmx debounced POST), template gallery for starting points,
          rendered prompt preview (show what the agent will see), validation
          result display with severity colors, and a "submit to conductor"
          button. Create/modify templates, routes, and htmx partials.

    verification_focus:
      1:
        name: "Tests & Types"
        directive: |
          Run the full dashboard test suite and type checker:
          1. pytest tests/test_dashboard*.py -v --tb=short
          2. mypy src/mozart/dashboard/ --ignore-missing-imports
          Report: total tests, passed, failed, type errors.
          If anything fails, diagnose WHY (don't just report the failure).
      2:
        name: "Lint & Imports"
        directive: |
          Run lint and verify all imports resolve:
          1. ruff check src/mozart/dashboard/
          2. Import canary: python -c "from mozart.dashboard.app import create_app; ..."
          3. Verify CLI registration: mozart dashboard --help
          4. Check for unused imports, dead code, style issues.
          Report findings. Fix anything trivially fixable.
      3:
        name: "Integration"
        directive: |
          Verify the dashboard works end-to-end:
          1. Does the dashboard start? (import and instantiate create_app())
          2. Do all page routes return 200? (test each registered page route)
          3. Do API endpoints return valid JSON? (test key /api/ routes)
          4. Do SSE endpoints stream? (test /api/jobs/{id}/stream connects)
          5. Do new templates render without errors?
          6. Does htmx integration work? (check for hx-* attributes, partials)
          Write a mini integration test if none exists for critical paths.

  template: |
    {# ═══════════════════════════════════════════════════════════════════════ #}
    {# MACROS                                                                 #}
    {# ═══════════════════════════════════════════════════════════════════════ #}

    {% macro save_to(filename) %}

    ---
    **Save to:** {{ workspace }}/{{ filename }}
    Include `IMPLEMENTATION_COMPLETE: yes` at the top of the file.
    {% endmacro %}

    {% macro refinement_notice() %}
    ╔══════════════════════════════════════════════════════════════════════════╗
    ║  SECOND PASS — REFINEMENT                                               ║
    ║  This stage runs twice. Read what the previous sheet built.             ║
    ║  Focus on: improving, simplifying, covering missed edge cases,          ║
    ║  removing dead code, and tightening error handling.                     ║
    ║  Do NOT start over. Build on existing work.                             ║
    ╚══════════════════════════════════════════════════════════════════════════╝
    {% endmacro %}

    {% macro review_protocol(pass_name, result_files) %}
    ## Code Review: {{ pass_name }}

    Read ALL code changes from the {{ pass_name }} execute stages. Check:

    1. **Regressions**: Do existing tests still pass?
       `pytest tests/test_dashboard*.py -x -q --tb=short`

    2. **Code quality**: Does the new code follow existing patterns?
       - Async consistency
       - Pydantic model usage
       - Error handling (proper HTTP status codes, not bare 500s)
       - Type hints on all functions

    3. **Security**: Any new vulnerabilities?
       - Path traversal in new routes
       - XSS in new templates
       - Missing auth on new endpoints

    4. **htmx correctness**: Do partials return proper HTML fragments?
       Are hx-* attributes correct? Do fallbacks work without JS?

    5. **Template quality**: No broken includes, no missing variables,
       no Jinja2 errors when rendered with test data.

    Previous result files to review:
    {% for f in result_files %}
    - {{ workspace }}/{{ f }}
    {% endfor %}

    List every issue found with: file, line, severity, fix needed.
    {% endmacro %}

    {% macro fixup_protocol(review_file) %}
    ## Fixup

    Read the code review at {{ workspace }}/{{ review_file }}.

    For EVERY issue listed:
    1. Read the file and line cited
    2. Fix it
    3. Note what you changed

    After all fixes, run: `pytest tests/test_dashboard*.py -x -q --tb=short`

    If you introduce new issues while fixing, fix those too. The codebase
    must be cleaner after this stage than before.
    {% endmacro %}

    {# ═══════════════════════════════════════════════════════════════════════ #}
    {# COMPUTED VALUES                                                        #}
    {# ═══════════════════════════════════════════════════════════════════════ #}

    {% set is_refinement = stage in [4, 9, 13] %}
    {% set progress = ((stage / total_stages) * 100) | round %}

    {# ═══════════════════════════════════════════════════════════════════════ #}
    {# PREAMBLE                                                               #}
    {# ═══════════════════════════════════════════════════════════════════════ #}

    {{ preamble }}

    *Stage {{ stage }}/{{ total_stages }} ({{ progress }}% through score)*
    {% if fan_count > 1 %}*Instance {{ instance }}/{{ fan_count }}*{% endif %}

    {# ═══════════════════════════════════════════════════════════════════════ #}
    {# PASS 1: FOUNDATION                                                     #}
    {# ═══════════════════════════════════════════════════════════════════════ #}

    {% if stage == 1 %}
    {# ─── INVESTIGATION (fan-out: 3 instances) ─── #}
    {% set focus = investigation_focus[instance] %}

    # Investigation: {{ focus.name }}

    {{ focus.directive }}

    Read the entire `src/mozart/dashboard/` directory structure. Read every
    file you need to answer your investigation questions. Be thorough — the
    foundation pass depends on accurate intelligence.

    {{ save_to("01-" ~ focus.name | lower | replace(" ", "-") ~ ".md") }}


    {% elif stage == 2 %}
    {# ─── PLAN ─── #}

    # Plan: Foundation Work

    Read all three investigation reports:
    - {{ workspace }}/01-bug-inventory.md
    - {{ workspace }}/01-architecture-review.md
    - {{ workspace }}/01-feature-gap-analysis.md

    Synthesize into a prioritized work plan for the foundation pass:

    1. **Critical bug fixes** — ordered by severity (crashes first)
    2. **Middleware wiring** — SecurityHeadersMiddleware, RateLimitMiddleware
    3. **htmx integration** — add script to base template, establish partial
       response patterns, identify which existing pages benefit most
    4. **Template fixes** — any missing or broken templates

    For each item: what file(s) to change, what the change is, and why.

    Do NOT plan feature work — that's Pass 2. This pass makes what exists
    actually work correctly.

    {{ save_to("02-plan.md") }}


    {% elif stage == 3 or stage == 4 %}
    {# ─── EXECUTE FOUNDATION ─── #}

    # Execute: Foundation {{ "— Refinement Pass" if is_refinement else "" }}

    {% if is_refinement %}
    {{ refinement_notice() }}

    Read {{ workspace }}/03-foundation.md for what the first pass built.
    {% endif %}

    Read the plan at {{ workspace }}/02-plan.md.

    **Deliver these outcomes:**

    1. **All critical bugs fixed.** Every bug from the inventory that causes
       a runtime crash or 500 error must be resolved. This means:
       - Constructor signatures match between callers and callees
       - All referenced templates exist on disk
       - Route prefixes produce correct URLs
       - All imports resolve

    2. **Security middleware wired.** Register `SecurityHeadersMiddleware` and
       `RateLimitMiddleware` in `app.py`. Follow the existing middleware
       registration pattern (CORS is already there as an example).

    3. **htmx integrated.** Add the htmx script to the base template.
       Convert at least one existing interaction (e.g., job list refresh)
       to use htmx partial responses as a proof of pattern.

    4. **Tests pass.** `pytest tests/test_dashboard*.py -x -q` must pass
       after your changes. Fix any test breakage you cause.

    After completing your work, run:
    ```bash
    pytest tests/test_dashboard*.py -x -q --tb=short
    python -c "from mozart.dashboard.app import create_app; print('OK')"
    ```

    {{ save_to("0" ~ stage ~ "-foundation.md") }}


    {% elif stage == 5 %}
    {# ─── CODE REVIEW: FOUNDATION ─── #}

    {{ review_protocol("Foundation", ["03-foundation.md", "04-foundation.md"]) }}

    {{ save_to("05-review.md") }}


    {% elif stage == 6 %}
    {# ─── FIXUP: FOUNDATION ─── #}

    {{ fixup_protocol("05-review.md") }}

    {{ save_to("06-fixup.md") }}


    {# ═══════════════════════════════════════════════════════════════════════ #}
    {# PASS 2: FEATURES                                                       #}
    {# ═══════════════════════════════════════════════════════════════════════ #}

    {% elif stage == 7 %}
    {# ─── RE-INVESTIGATION (fan-out: 2 instances) ─── #}
    {% set focus = reinvestigation_focus[instance] %}

    # Re-investigate: {{ focus.name }}

    {{ focus.directive }}

    {{ save_to("07-" ~ focus.name | lower | replace(" ", "-") ~ ".md") }}


    {% elif stage == 8 %}
    {# ─── EXECUTE FEATURES (fan-out: 3 instances) ─── #}
    {% set focus = feature_focus[instance] %}

    # Build: {{ focus.name }}

    Read the feature plan at {{ workspace }}/07-feature-planning.md.

    {{ focus.directive }}

    **PARALLEL STAGE:** You are one of {{ fan_count }} parallel builders.
    Only modify files in YOUR scope. Do not touch files that other instances
    are building. Shared files (base template, main CSS) should only be
    extended, not restructured — add classes and blocks, don't rewrite.

    **htmx patterns to use:**
    - `hx-get` for loading content into page sections
    - `hx-trigger="every 5s"` for auto-refreshing status displays
    - `hx-swap="innerHTML"` for updating panels
    - `hx-indicator` for loading spinners
    - Return HTML fragments from partial routes, not full pages

    After your work, verify:
    ```bash
    pytest tests/test_dashboard*.py -x -q --tb=short
    python -c "from mozart.dashboard.app import create_app; print('OK')"
    ```

    {{ save_to("08-" ~ focus.name | lower | replace(" ", "-") ~ ".md") }}


    {% elif stage == 9 %}
    {# ─── FEATURE REFINEMENT (holistic pass) ─── #}

    {{ refinement_notice() }}

    # Feature Refinement

    Three parallel builders just created pages independently. Now harmonize
    them into a cohesive experience.

    Read all feature results:
    - {{ workspace }}/08-dashboard-overview.md
    - {{ workspace }}/08-monitoring-page.md
    - {{ workspace }}/08-score-editor.md

    **Focus areas:**

    1. **Consistent patterns.** Do all pages use the same htmx conventions?
       Same loading indicator style? Same error display? Same card/panel
       components? Unify anything that diverged.

    2. **Navigation.** All pages must be reachable from a shared navigation
       bar. Active page should be highlighted. Add nav links if missing.

    3. **Shared components.** Extract any repeated UI patterns (status badges,
       progress bars, job cards) into template components if not already.

    4. **Cross-page data flow.** Does clicking a job on the overview page
       link to the detail page? Does the monitoring page link to specific
       jobs? Wire the pages together.

    5. **Missing edge cases.** What happens when there are no jobs? When the
       daemon is down? When SSE disconnects? Each page needs empty states
       and error states.

    After refinement:
    ```bash
    pytest tests/test_dashboard*.py -x -q --tb=short
    ```

    {{ save_to("09-features-refined.md") }}


    {% elif stage == 10 %}
    {# ─── CODE REVIEW: FEATURES ─── #}

    {{ review_protocol("Features", ["08-dashboard-overview.md", "08-monitoring-page.md", "08-score-editor.md", "09-features-refined.md"]) }}

    {{ save_to("10-review.md") }}


    {% elif stage == 11 %}
    {# ─── FIXUP: FEATURES ─── #}

    {{ fixup_protocol("10-review.md") }}

    {{ save_to("11-fixup.md") }}


    {# ═══════════════════════════════════════════════════════════════════════ #}
    {# PASS 3: POLISH + SHIP                                                  #}
    {# ═══════════════════════════════════════════════════════════════════════ #}

    {% elif stage == 12 or stage == 13 %}
    {# ─── EXECUTE POLISH ─── #}

    # Execute: Polish {{ "— Refinement Pass" if is_refinement else "" }}

    {% if is_refinement %}
    {{ refinement_notice() }}

    Read {{ workspace }}/12-polish.md for what the first pass built.
    {% endif %}

    **Deliver these outcomes:**

    1. **Loading states.** Every htmx request shows a loading indicator.
       Use `hx-indicator` with a consistent spinner/skeleton pattern.

    2. **Error states.** Connection lost, daemon not running, job not found,
       server error — each has a clear, helpful error display. Not just
       blank screens or raw JSON errors.

    3. **Empty states.** No jobs yet? First visit? No scores? Each page
       handles the zero-data case with helpful guidance (not just "no data").

    4. **Navigation polish.** Breadcrumbs on detail pages. Active page
       indicator in nav. Consistent page titles in `<title>` tag.

    5. **Responsive basics.** The dashboard should be usable on a laptop
       screen. Not mobile-first, but not broken at 1280px or 1920px.

    6. **Keyboard accessibility.** Tab order makes sense. Interactive
       elements are focusable. No focus traps.

    After completing your work:
    ```bash
    pytest tests/test_dashboard*.py -x -q --tb=short
    ```

    {{ save_to(stage ~ "-polish.md") }}


    {% elif stage == 14 %}
    {# ─── CODE REVIEW: POLISH ─── #}

    {{ review_protocol("Polish", ["12-polish.md", "13-polish.md"]) }}

    {{ save_to("14-review.md") }}


    {% elif stage == 15 %}
    {# ─── VERIFICATION (fan-out: 3 instances) ─── #}
    {% set focus = verification_focus[instance] %}

    # Verify: {{ focus.name }}

    {{ focus.directive }}

    {{ save_to("15-" ~ focus.name | lower | replace(" ", "-") ~ ".md") }}


    {% elif stage == 16 %}
    {# ─── FIXUP: VERIFICATION ─── #}

    # Fixup: Verification Issues

    Read all verification reports:
    - {{ workspace }}/15-tests-&-types.md
    - {{ workspace }}/15-lint-&-imports.md
    - {{ workspace }}/15-integration.md

    Fix EVERY issue found. Priority order:
    1. Test failures (must be zero)
    2. Type errors (should be zero)
    3. Lint violations (fix what's reasonable)
    4. Integration issues (must all work)

    After all fixes:
    ```bash
    pytest tests/test_dashboard*.py -x -q --tb=short
    mypy src/mozart/dashboard/ --ignore-missing-imports
    ruff check src/mozart/dashboard/
    python -c "from mozart.dashboard.app import create_app; print('OK')"
    ```

    All four commands must succeed.

    {{ save_to("16-fixup.md") }}


    {% elif stage == 17 %}
    {# ─── COMMIT + PUSH ─── #}

    # Commit & Push

    Read {{ workspace }}/16-fixup.md to verify all issues are resolved.

    **Step 1: Final verification**
    ```bash
    cd /home/emzi/Projects/mozart-ai-compose
    pytest tests/test_dashboard*.py -x -q --tb=short
    python -c "from mozart.dashboard.app import create_app; print('OK')"
    echo "Branch: $(git branch --show-current)"
    ```

    **Step 2: Stage files explicitly** (NEVER `git add .`)
    ```bash
    git status --short | head -40
    ```
    Stage only files under `src/mozart/dashboard/` and `tests/test_dashboard*.py`
    that were modified or created by this concert. Review the diff before staging.

    **Step 3: Commit**
    Write a commit message that describes what was built, not what files changed.
    Format: `feat(dashboard): <summary>`

    **Step 4: Push to main**
    ```bash
    git push origin main
    ```

    If tests fail or verification fails, do NOT commit. List what needs
    fixing in your result file instead.

    {{ save_to("17-commit.md") }}

    {% endif %}


validations:
  # ─── Universal: Result file with completion marker ───
  - type: file_exists
    path: "{workspace}/02-plan.md"
    condition: "stage >= 2"
    stage: 1
    description: "Plan exists"

  # ─── Foundation gate: imports work ───
  - type: command_succeeds
    command: 'cd /home/emzi/Projects/mozart-ai-compose && .venv/bin/python -c "from mozart.dashboard.app import create_app; print(\"OK\")"'
    condition: "stage >= 4"
    stage: 1
    description: "Dashboard imports successfully"

  # ─── Foundation gate: tests pass ───
  - type: command_succeeds
    command: 'cd /home/emzi/Projects/mozart-ai-compose && .venv/bin/pytest tests/test_dashboard.py -x -q --tb=no --no-header 2>&1 | tail -1 | grep -qE "[0-9]+ passed"'
    condition: "stage >= 4"
    stage: 2
    description: "Dashboard tests pass"

  # ─── Feature gate: overview page template exists ───
  - type: command_succeeds
    command: 'ls /home/emzi/Projects/mozart-ai-compose/src/mozart/dashboard/templates/pages/ | grep -qiE "overview|dashboard|index"'
    condition: "stage >= 9"
    stage: 1
    description: "Dashboard overview template exists"

  # ─── Verify gate: full test suite ───
  - type: command_succeeds
    command: 'cd /home/emzi/Projects/mozart-ai-compose && .venv/bin/pytest tests/test_dashboard*.py -x -q --tb=no --no-header 2>&1 | tail -1 | grep -qE "[0-9]+ passed"'
    condition: "stage >= 15"
    stage: 1
    description: "All dashboard tests pass"

  # ─── Verify gate: type check ───
  - type: command_succeeds
    command: 'cd /home/emzi/Projects/mozart-ai-compose && .venv/bin/mypy src/mozart/dashboard/ --ignore-missing-imports 2>&1 | tail -1 | grep -qE "Success|no issues"'
    condition: "stage >= 16"
    stage: 2
    description: "mypy passes on dashboard"

  # ─── Verify gate: lint ───
  - type: command_succeeds
    command: 'cd /home/emzi/Projects/mozart-ai-compose && .venv/bin/ruff check src/mozart/dashboard/ --quiet 2>&1 | wc -l | xargs test 0 -eq'
    condition: "stage >= 16"
    stage: 2
    description: "ruff passes on dashboard"

  # ─── Commit gate: result file ───
  - type: file_exists
    path: "{workspace}/17-commit.md"
    condition: "stage >= 17"
    stage: 1
    description: "Commit report exists"

