# dashboard-daemon-bridge.yaml
#
# Connects the Mozart Dashboard to the live conductor daemon, replacing the
# local SQLite StateBackend with real-time IPC data. Adds four backend
# service layers, new API endpoints, and enriched frontend views.
#
# Design doc: docs/plans/2026-02-25-dashboard-daemon-data-bridge-design.md
#
# Execution flow: 14 sequential stages
#   1-2:  Backend data layers (adapter, IPC methods)
#   3-5:  Service layers (events, analytics, system view)
#   6:    Wire into app.py + update existing routes
#   7-8:  Index + jobs list page enhancements
#   9:    Job detail page enhancements
#   10:   Monitor page enhancements
#   11:   Analytics page (new)
#   12:   Integration testing
#   13:   Browser verification (Playwright)
#   14:   Polish + edge cases
#
# Usage:
#   mozart validate scores/dashboard-daemon-bridge.yaml
#   mozart run scores/dashboard-daemon-bridge.yaml

name: "dashboard-daemon-bridge"
description: "Connect dashboard to live conductor daemon with real-time data"

workspace: "/home/emzi/Projects/mozart-ai-compose/workspace-dashboard-bridge"

backend:
  type: claude_cli
  skip_permissions: true
  timeout_seconds: 3600
  disable_mcp: true
  timeout_overrides:
    6: 5400    # app.py wiring — touches many files, route updates
    9: 5400    # Job detail — most complex page enhancement
    11: 5400   # Analytics page — full new page build
    12: 5400   # Integration testing — full suite
    13: 5400   # Browser verification — starts server, takes screenshots

sheet:
  size: 1
  total_items: 14
  dependencies:
    2: [1]
    3: [2]
    4: [3]
    5: [4]
    6: [5]
    7: [6]
    8: [6]      # Jobs list can parallel with index page
    9: [6]      # Job detail can parallel with index/jobs
    10: [6]     # Monitor can parallel with above
    11: [6]     # Analytics can parallel with above
    12: [7, 8, 9, 10, 11]   # Integration after all pages
    13: [12]
    14: [13]

parallel:
  enabled: true
  max_concurrent: 3

cross_sheet:
  auto_capture_stdout: true
  max_output_chars: 3000
  lookback_sheets: 3

retry:
  max_retries: 2
  max_completion_attempts: 3
  completion_threshold_percent: 60

stale_detection:
  enabled: true
  idle_timeout_seconds: 1800

pause_between_sheets_seconds: 5

prompt:
  variables:
    project: "/home/emzi/Projects/mozart-ai-compose"
    design_doc: "docs/plans/2026-02-25-dashboard-daemon-data-bridge-design.md"

  template: |
    {% macro project_context() %}
    ## Project Context — Mozart Dashboard ↔ Daemon Bridge

    You are implementing the dashboard-daemon data bridge for Mozart,
    an AI orchestration framework. The dashboard currently reads from a local
    SQLite StateBackend. You're replacing that data source with live IPC
    calls to the running conductor daemon.

    **Project root:** `{{ project }}`
    **Venv activation:** `source {{ project }}/.venv/bin/activate`

    **Key patterns:**
    - FastAPI + Jinja2 templates + htmx + Alpine.js frontend
    - DaemonClient IPC over Unix socket (JSON-RPC 2.0)
    - StateBackend ABC in `src/mozart/state/base.py`
    - Existing dashboard routes in `src/mozart/dashboard/routes/`
    - Tailwind CSS CDN + dark mode support

    **Design doc:** `{{ project }}/{{ design_doc }}`

    Read the design doc for the full architecture. Your changes must:
    - Keep all existing dashboard tests passing
    - Follow existing code patterns (read before writing)
    - Use type hints throughout
    - Not break any existing functionality
    {% endmacro %}

    {% macro dev_workflow() %}
    ## Development Workflow

    1. Read existing code first — understand before modifying
    2. Write tests alongside implementation
    3. Run relevant tests after changes
    4. Run ruff on modified files
    5. Git commit with conventional commit message

    ```bash
    cd {{ project }}
    source .venv/bin/activate
    pytest tests/test_dashboard*.py -x -q --tb=short
    ruff check src/mozart/dashboard/
    ```

    After committing, print a summary of what changed and what files were touched.
    {% endmacro %}

    {% macro frontend_patterns() %}
    ## Frontend Patterns

    Follow these established patterns exactly:
    - **Pages** extend `base.html` via `{% raw %}{% extends "base.html" %}{% endraw %}`
    - **Partials** are htmx targets loaded via `hx-get`, return HTML fragments
    - **Alpine.js** for local state: `x-data="{ ... }"` per section
    - **htmx** for polling: `hx-trigger="load, every Ns"` with `hx-swap="innerHTML"`
    - **SSE** via native EventSource in Alpine `init()` for real-time data
    - **Tailwind CSS** classes only, dark mode with `dark:` prefix
    - **Status colors**: green=success, red=failed, amber=warning, blue=running, gray=pending
    - **Responsive**: `lg:grid-cols-N` breakpoints, stack on mobile

    Read `src/mozart/dashboard/templates/base.html` and an existing page template
    before writing any templates.
    {% endmacro %}

    {# ════════════════════════════════════════════════════════════════ #}

    {% if stage == 1 %}
    # Stage 1: DaemonStateAdapter — StateBackend over DaemonClient

    {{ project_context() }}

    ## What to Build

    Create `src/mozart/dashboard/state/__init__.py` (empty) and
    `src/mozart/dashboard/state/daemon_adapter.py` with:

    **`DaemonStateAdapter(StateBackend)`** that wraps `DaemonClient`:
    - `__init__(self, client: DaemonClient)` — store the client
    - `async load(self, job_id: str) -> CheckpointState | None` — calls
      `client.get_job_status(job_id, "")`, parses result into `CheckpointState`.
      Returns `None` if job not found (catches `DaemonError`).
    - `async list_jobs(self) -> list[CheckpointState]` — calls `client.list_jobs()`
      for the roster. For each job, calls `client.get_job_status(job_id, "")` to
      get rich data. Returns list of `CheckpointState` objects. If `get_job_status`
      fails for a job, construct a minimal `CheckpointState` from the roster data
      (job_id, status, submitted_at).
    - Write methods (`save`, `delete`, `get_next_sheet`, `mark_sheet_status`) raise
      `NotImplementedError("Dashboard is read-only")`.
    - `async close(self)` — no-op (DaemonClient has no persistent connection).

    **Important implementation details:**
    - `DaemonClient.list_jobs()` returns `list[dict]` with keys: `job_id`, `status`,
      `config_path`, `workspace`, `submitted_at`, `started_at`, `error_message`.
    - `DaemonClient.get_job_status()` returns a dict that can be parsed as
      `CheckpointState(**data)` — it's the `model_dump(mode="json")` output.
    - Read `src/mozart/state/base.py` for the full `StateBackend` interface.
    - Read `src/mozart/daemon/ipc/client.py` for `DaemonClient` methods.
    - Read `src/mozart/core/checkpoint.py` for `CheckpointState` model.

    **Tests:** Create `tests/test_daemon_state_adapter.py`:
    - Mock `DaemonClient` to avoid needing a running daemon
    - Test `list_jobs()` returns `CheckpointState` objects
    - Test `load()` returns `CheckpointState` for known job
    - Test `load()` returns `None` for unknown job
    - Test write methods raise `NotImplementedError`
    - Test `list_jobs()` gracefully handles individual job failures

    {{ dev_workflow() }}

    Commit: `feat(dashboard): add DaemonStateAdapter — StateBackend over DaemonClient`

    {# ════════════════════════════════════════════════════════════════ #}

    {% elif stage == 2 %}
    # Stage 2: New Daemon IPC Methods

    {{ project_context() }}

    ## What to Build

    Add two new IPC methods to the daemon and corresponding client convenience methods.

    ### Daemon side (`src/mozart/daemon/process.py`)

    In `_register_methods()`, add two handlers after the existing `daemon.observer_events`:

    1. **`daemon.rate_limits`** — returns rate limit state
       ```python
       async def handle_rate_limits(_p: dict, _w: Any) -> dict:
           coordinator = manager._rate_coordinator
           if coordinator is None:
               return {"backends": {}, "active_limits": 0}
           # Extract _active_limits and recent _events from coordinator
           return {
               "backends": {k: {"resume_at": v} for k, v in coordinator._active_limits.items()},
               "active_limits": len(coordinator._active_limits),
               "recent_events_count": len(coordinator._events),
           }
       ```
       Read `src/mozart/daemon/rate_coordinator.py` to understand the data shape.

    2. **`daemon.learning.patterns`** — returns recent learning insights
       ```python
       async def handle_learning_patterns(params: dict, _w: Any) -> dict:
           hub = manager._learning_hub
           if hub is None:
               return {"patterns": []}
           limit = params.get("limit", 20)
           # Get recent patterns from the learning store
           # Read LearningHub and GlobalLearningStore to find the right query
           return {"patterns": [...]}
       ```
       Read `src/mozart/daemon/learning_hub.py` and `src/mozart/learning/store/base.py`
       to understand what pattern data is available.

    Register both:
    ```python
    handler.register("daemon.rate_limits", handle_rate_limits)
    handler.register("daemon.learning.patterns", handle_learning_patterns)
    ```

    ### Client side (`src/mozart/daemon/ipc/client.py`)

    Add convenience methods:
    ```python
    async def rate_limits(self) -> dict[str, Any]:
        return cast(dict[str, Any], await self.call("daemon.rate_limits"))

    async def learning_patterns(self, limit: int = 20) -> dict[str, Any]:
        return cast(dict[str, Any], await self.call("daemon.learning.patterns", {"limit": limit}))
    ```

    **Tests:** Add tests to verify the IPC methods work (mock the manager internals).

    {{ dev_workflow() }}

    Commit: `feat(daemon): add rate_limits and learning.patterns IPC methods`

    {# ════════════════════════════════════════════════════════════════ #}

    {% elif stage == 3 %}
    # Stage 3: DaemonEventBridge — EventBus → SSE

    {{ project_context() }}

    ## What to Build

    Create `src/mozart/dashboard/services/event_bridge.py`:

    **`DaemonEventBridge`** that polls daemon for events and provides SSE streams.

    ```python
    class DaemonEventBridge:
        def __init__(self, client: DaemonClient, poll_interval: float = 2.0):
            self._client = client
            self._poll_interval = poll_interval
            self._last_timestamps: dict[str, float] = {}  # job_id → last seen

        async def job_events(self, job_id: str) -> AsyncIterator[dict]:
            """Yield SSE events for a specific job. Polls daemon.observer_events."""
            ...

        async def all_events(self, limit: int = 50) -> AsyncIterator[dict]:
            """Yield SSE events across all jobs. For the event timeline."""
            ...

        async def observer_events(self, job_id: str, limit: int = 20) -> list[dict]:
            """Get recent observer events for a job (one-shot, not streaming)."""
            ...
    ```

    **Implementation:**
    - `job_events()` polls `client.call("daemon.observer_events", {"job_id": job_id, "limit": 50})`
      in a loop with `asyncio.sleep(poll_interval)` between polls
    - Deduplicates by tracking the latest timestamp per job
    - Transforms events into SSE format: `{"event": event_type, "data": json_payload}`
    - `all_events()` calls `client.list_jobs()` first, then polls observer_events for each

    Also create `src/mozart/dashboard/routes/events.py`:
    - `GET /api/events/stream` — SSE endpoint using `all_events()`
    - `GET /api/jobs/{job_id}/observer` — JSON endpoint using `observer_events()`

    Register the router in app.py later (stage 6).

    **Tests:** Create `tests/test_event_bridge.py` with mocked DaemonClient.

    {{ dev_workflow() }}

    Commit: `feat(dashboard): add DaemonEventBridge for real-time event streaming`

    {# ════════════════════════════════════════════════════════════════ #}

