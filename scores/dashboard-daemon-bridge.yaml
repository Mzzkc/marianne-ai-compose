    {% elif stage == 6 %}
    # Stage 6: Wire Everything into app.py + Update Existing Routes

    {{ project_context() }}

    ## What to Build

    This stage connects all the new services to the existing application.

    ### 1. Update `src/mozart/dashboard/app.py`

    In `create_app()`:
    - Import `DaemonStateAdapter`, `DaemonEventBridge`, `DaemonAnalytics`, `DaemonSystemView`
    - After middleware setup, create `DaemonClient` pointed at the daemon socket
    - Create `DaemonStateAdapter(client)` and assign as `_state_backend`
    - Create the three service instances, store on `app.state`:
      ```python
      app.state.event_bridge = DaemonEventBridge(client)
      app.state.analytics = DaemonAnalytics(adapter)
      app.state.system_view = DaemonSystemView(client)
      ```
    - Register new routers:
      ```python
      from mozart.dashboard.routes.analytics import router as analytics_router
      from mozart.dashboard.routes.events import router as events_router
      from mozart.dashboard.routes.system import router as system_router
      app.include_router(analytics_router)
      app.include_router(events_router)
      app.include_router(system_router)
      ```

    **Socket path:** Use the same pattern as `services/job_control.py`:
    ```python
    try:
        from mozart.daemon.config import DaemonConfig
        socket_path = DaemonConfig().socket.path
    except Exception:
        socket_path = Path.home() / ".mozart" / "daemon.sock"
    ```

    ### 2. Update `src/mozart/dashboard/routes/dashboard.py`

    - `get_dashboard_stats()` — use `app.state.analytics.get_stats()` instead of
      manually counting from `backend.list_jobs()`
    - `get_recent_jobs()` — use adapter's `list_jobs()` (already wired via backend)
    - `get_system_partial()` — use `app.state.system_view.get_snapshot()` instead
      of reading `monitor.db`

    ### 3. Update `src/mozart/dashboard/routes/monitor.py`

    - `get_monitor_snapshot()` — use `app.state.system_view.get_snapshot()`
    - SSE stream — poll `system_view.get_snapshot()` instead of reading JSONL/sqlite

    ### 4. Update `src/mozart/dashboard/templates/components/header.html`

    - Add "Analytics" nav item between "Monitor" and "Templates"

    Read every file you're modifying FIRST. Understand the current implementation
    before changing it. Don't break existing tests.

    **Run full dashboard tests after all changes:**
    ```bash
    pytest tests/test_dashboard*.py -x -q --tb=short
    ```

    {{ dev_workflow() }}

