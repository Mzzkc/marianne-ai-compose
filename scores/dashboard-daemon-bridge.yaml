    {% elif stage == 5 %}
    # Stage 5: DaemonSystemView — Live System Health

    {{ project_context() }}

    ## What to Build

    Create `src/mozart/dashboard/services/system_view.py`:

    **`DaemonSystemView`** wrapping daemon profiler and system state.

    ```python
    class DaemonSystemView:
        def __init__(self, client: DaemonClient):
            self._client = client

        async def get_snapshot(self) -> dict | None:
            """Get latest SystemSnapshot from daemon. Returns None if daemon down."""
            try:
                return await self._client.call("daemon.top")
            except Exception:
                return None

        async def get_daemon_status(self) -> dict | None:
            """Get daemon status (pid, uptime, running_jobs, memory)."""
            try:
                result = await self._client.status()
                return result.model_dump()
            except Exception:
                return None

        async def rate_limit_state(self) -> dict:
            """Current rate limit state per backend."""
            try:
                return await self._client.rate_limits()
            except Exception:
                return {"backends": {}, "active_limits": 0}

        async def pressure_level(self) -> dict:
            """Backpressure level from latest snapshot."""
            snap = await self.get_snapshot()
            if snap is None:
                return {"level": "unknown", "color": "gray"}
            level = snap.get("pressure_level", "NONE")
            colors = {"NONE": "green", "LOW": "yellow", "MEDIUM": "amber",
                      "HIGH": "orange", "CRITICAL": "red"}
            return {"level": level, "color": colors.get(level, "gray")}

        async def learning_patterns(self, limit: int = 20) -> list[dict]:
            """Recent learning insights."""
            try:
                result = await self._client.learning_patterns(limit)
                return result.get("patterns", [])
            except Exception:
                return []
    ```

    Also create `src/mozart/dashboard/routes/system.py`:
    - `GET /api/system/rate-limits` — Rate limit state (JSON)
    - `GET /api/system/pressure` — Backpressure level (JSON)
    - `GET /api/system/learning` — Learning patterns (JSON)

    **Tests:** Create `tests/test_dashboard_system_view.py` with mocked DaemonClient.

    {{ dev_workflow() }}

