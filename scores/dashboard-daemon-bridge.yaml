    class DaemonAnalytics:
        def __init__(self, adapter: DaemonStateAdapter, cache_ttl: float = 10.0):
            self._adapter = adapter
            self._cache_ttl = cache_ttl
            self._cache: dict[str, tuple[float, Any]] = {}

        async def get_stats(self) -> dict:
            """Dashboard stats: total, running, completed, failed, success_rate,
            total_spend, throughput_sheets_per_hour."""
            ...

        async def cost_rollup(self) -> dict:
            """Cost breakdown by job, total spend, avg cost per job."""
            ...

        async def validation_stats(self) -> dict:
            """Validation pass rates by rule type, overall pass rate."""
            ...

        async def error_breakdown(self) -> dict:
            """Error counts by category: transient, rate_limit, permanent."""
            ...

        async def duration_stats(self) -> dict:
            """Avg sheet duration, total job durations, slowest sheets."""
            ...

        def _cached(self, key: str, ttl: float | None = None) -> Any | None:
            """Return cached value if not expired."""
            ...

        def _set_cache(self, key: str, value: Any) -> None:
            ...
    ```

    **Implementation details:**
    - All methods call `self._adapter.list_jobs()` (cached) and iterate CheckpointStates
    - `get_stats()` counts by status, sums `total_estimated_cost`, calculates throughput
    - `cost_rollup()` groups costs by job_id
    - `validation_stats()` iterates `sheets[N].validation_details` across all jobs
    - `error_breakdown()` iterates `sheets[N].error_history` entries
    - `duration_stats()` computes from `sheets[N].execution_duration_seconds`

    Also create `src/mozart/dashboard/routes/analytics.py`:
    - `GET /api/analytics/stats` — Full stats (JSON)
    - `GET /api/analytics/costs` — Cost rollup (JSON)
    - `GET /api/analytics/validations` — Validation stats (JSON)
    - `GET /api/analytics/errors` — Error breakdown (JSON)

    **Tests:** Create `tests/test_dashboard_analytics.py` with mock adapter returning
    fabricated CheckpointStates.

