    {% elif stage == 4 %}
    ╔══════════════════════════════════════════════════════════════════════════════╗
    ║  STAGE 4: CREATE RENDERING PREVIEW ENGINE                                 ║
    ╚══════════════════════════════════════════════════════════════════════════════╝

    Create a new file: `src/mozart/validation/rendering.py`

    **Read these files first** to understand the template system:
    - `src/mozart/prompts/templating.py` — `PromptBuilder`, `SheetContext`, `build_sheet_context`
    - `src/mozart/core/config/job.py` — `SheetConfig.get_fan_out_metadata()`
    - `src/mozart/core/fan_out.py` — `FanOutMetadata`
    - `src/mozart/execution/validation/engine.py` — `_check_condition` logic (lines 104-145)
    - `src/mozart/core/config/__init__.py` — `JobConfig`, `ValidationRule`

    **Data structures** (use `@dataclass`):

    ```python
    from __future__ import annotations
    from dataclasses import dataclass, field
    from pathlib import Path

    @dataclass
    class ExpandedValidation:
        index: int
        type: str
        description: str | None
        raw_path: str | None
        expanded_path: str | None
        pattern: str | None
        condition: str | None
        applicable: bool

    @dataclass
    class SheetPreview:
        sheet_num: int
        item_range: tuple[int, int]
        rendered_prompt: str | None
        prompt_snippet: str
        expanded_validations: list[ExpandedValidation]
        stage: int | None
        instance: int | None
        fan_count: int | None
        render_error: str | None

    @dataclass
    class RenderingPreview:
        sheets: list[SheetPreview]
        total_sheets: int
        has_fan_out: bool
        has_dependencies: bool
        render_errors: list[str] = field(default_factory=list)
    ```

    **Core function:**

    ```python
    def generate_preview(
        config: JobConfig,
        config_path: Path,
        *,
        max_sheets: int | None = None,
    ) -> RenderingPreview:
    ```

    **Logic for each sheet** (1..total_sheets, capped by max_sheets):

    1. **Build SheetContext** — use `PromptBuilder.build_sheet_context()`.
       Pass `sheet_num`, `total_sheets`, `workspace=config.workspace`.
       Get fan-out metadata via `config.sheet.get_fan_out_metadata(sheet_num)`.
       Set `stage`, `instance`, `fan_count`, `total_stages`.
       Leave `previous_outputs` and `previous_files` empty (not available at preview time).

    2. **Resolve prelude/cadenza files** — if `config.sheet.prelude` exists, try to
       read each file. Use the same Jinja rendering for the file path that
       the template system uses. If a file doesn't exist, skip gracefully.
       Populate `injected_context`, `injected_skills`, `injected_tools` on the context.

    3. **Render template** — use `PromptBuilder.build_sheet_prompt(context)`.
       Wrap in try/except for `jinja2.TemplateError` — store error in `render_error`.

    4. **Expand validation paths** — for each `config.validations`, apply single-brace
       format replacement using a dict built from the sheet context:
       `str(config.workspace)` for workspace, `str(sheet_num)` for sheet_num, etc.
       Catch `KeyError` if a variable is not available.

    5. **Check validation applicability** — evaluate `condition` against the context.
       Reimplement the condition logic (it's simple — split on " and ", then for
       each part parse `var op value` where op is `>=`, `<=`, `==`, `!=`, `>`, `<`).
       Return True if condition is None.

    6. **Build snippet** — first 15 lines of rendered prompt, with "..." appended
       if truncated.

    **Helper functions:**
    - `_expand_path(template: str, context: dict[str, str]) -> str`
    - `_check_condition(condition: str | None, context: dict[str, int]) -> bool`
    - `_build_snippet(text: str, max_lines: int = 15) -> str`

    **Output to:** {{ workspace }}/04-rendering-engine.md

    Report: file path, all classes/functions created, and a summary.

