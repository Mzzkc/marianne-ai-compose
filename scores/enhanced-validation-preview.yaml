# ╔══════════════════════════════════════════════════════════════════════════════╗
# ║        ENHANCED VALIDATION: RENDERING PREVIEWS & BEST-PRACTICE CHECKS     ║
# ║                                                                            ║
# ║  Implements the "Enhanced Validation with Rendering Previews and           ║
# ║  Best-Practice Checks" plan in 9 sequential stages.                        ║
# ║                                                                            ║
# ║  Stage→Sheet mapping:                                                      ║
# ║    1: Create 9 best-practice validation checks (new file)                  ║
# ║    2: Wire checks into __init__.py and runner.py                           ║
# ║    3: Test all 9 best-practice checks                                      ║
# ║    4: Create rendering preview engine (new file)                           ║
# ║    5: Test rendering preview engine                                        ║
# ║    6: Add rendering output methods to reporter                             ║
# ║    7: Wire rendering into validate command                                 ║
# ║    8: Wire rendering into dry-run                                          ║
# ║    9: Full verification — pytest, mypy, ruff                               ║
# ║                                                                            ║
# ║  Usage:                                                                    ║
# ║    mozart start   # if not already running                                 ║
# ║    mozart run scores/enhanced-validation-preview.yaml                      ║
# ╚══════════════════════════════════════════════════════════════════════════════╝

name: "enhanced-validation-preview"
description: "Add rendering previews and best-practice checks to mozart validate and --dry-run"
workspace: "./.enhanced-validation-workspace"

backend:
  type: claude_cli
  skip_permissions: true
  disable_mcp: true
  timeout_seconds: 2400
  timeout_overrides:
    1: 3600
    4: 3600
    9: 3600

cross_sheet:
  auto_capture_stdout: true
  max_output_chars: 3000
  lookback_sheets: 3
  capture_files:
    - "{{ workspace }}/*.md"

sheet:
  size: 1
  total_items: 9

  dependencies:
    2: [1]
    3: [2]
    4: [3]
    5: [4]
    6: [5]
    7: [6]
    8: [6]
    9: [7, 8]

parallel:
  enabled: true
  max_concurrent: 2

retry:
  max_retries: 2

stale_detection:
  enabled: true
  idle_timeout_seconds: 1800

prompt:
  template: |
    {{ preamble }}

    {% if stage == 1 %}
    ╔══════════════════════════════════════════════════════════════════════════════╗
    ║  STAGE 1: CREATE 9 BEST-PRACTICE VALIDATION CHECKS                        ║
    ╚══════════════════════════════════════════════════════════════════════════════╝

    Create a new file: `src/mozart/validation/checks/best_practices.py`

    This file implements 9 new validation checks following the EXACT same protocol
    as existing checks in `src/mozart/validation/checks/config.py`. Each check
    is a class with `check_id`, `severity`, `description` properties and a
    `check(config, config_path, raw_yaml)` method returning `list[ValidationIssue]`.

    **Read these files first** to understand the patterns:
    - `src/mozart/validation/checks/config.py` — existing check implementations
    - `src/mozart/validation/base.py` — `ValidationIssue`, `ValidationSeverity`, `ValidationCheck` protocol
    - `src/mozart/validation/checks/_helpers.py` — `find_line_in_yaml`, `resolve_path`
    - `src/mozart/core/config/job.py` — `JobConfig`, `SheetConfig` (for `fan_out`, `fan_out_stage_map`)
    - `src/mozart/core/config/backend.py` — `BackendConfig` (for `skip_permissions`, `disable_mcp`)

    **The 9 checks to implement:**
    {% raw %}
    ### V201: JinjaInValidationPathCheck (WARNING)
    Detects `{{ workspace }}` or `{{ sheet_num }}` in validation paths. Validation
    paths use Python `.format()` syntax (`{workspace}`), not Jinja (`{{ workspace }}`).
    Scan `config.validations` for paths containing `{{`.
    Suggestion: "Use {workspace} not {{ workspace }} in validation paths"

    ### V202: FormatSyntaxInTemplateCheck (WARNING)
    Detects `{sheet_num}`, `{workspace}`, `{start_item}`, `{end_item}`, `{stage}`,
    `{instance}`, `{fan_count}`, `{total_sheets}`, `{total_stages}` in the prompt
    template. These are format-string syntax and should be `{{ name }}` in Jinja.
    **Only flag known built-in names** to avoid false positives on user text with
    braces. Check in `config.prompt.template` (the raw template string, not the
    rendered output). Look for `{name}` but NOT `{{ name }}` — the pattern is
    a single-brace variable reference for a known built-in name. Use regex like
    r'(?<!\{)\{(name)\}(?!\})' to match single-brace but not double-brace.
    {% endraw %}
    ### V203: NoValidationsCheck (WARNING)
    Fires when `len(config.validations) == 0`. Every job should have at least
    one validation — without them, sheets always "pass" and you learn nothing.
    Suggestion: "Add at least one validation rule — see docs/score-writing-guide.md"

    ### V204: MissingSkipPermissionsCheck (WARNING)
    Fires when `config.backend.type == "claude_cli"` and
    `config.backend.skip_permissions is False`. Claude CLI will prompt for
    permission approval, which hangs in unattended mode.
    Suggestion: "Set backend.skip_permissions: true for unattended execution"

    ### V205: FileExistsOnlyCheck (INFO)
    Fires when ALL validations are `file_exists` type (and there's at least one).
    `file_exists` alone can't detect stale files from previous runs.
    Suggestion: "Consider adding file_modified or content checks to detect stale files"

    ### V206: FanOutWithoutDependenciesCheck (WARNING)
    Fires when `config.sheet.fan_out_stage_map is not None` (fan-out is configured)
    but `config.sheet.dependencies` is empty or None. Stages may run out of order.
    Suggestion: "Add sheet.dependencies to control stage execution order"

    ### V207: FanOutWithoutParallelCheck (INFO)
    Fires when `config.sheet.fan_out_stage_map is not None` but
    `config.parallel.enabled is False`. Fan-out instances will run sequentially.
    Suggestion: "Enable parallel.enabled: true to run fan-out instances concurrently"
    {% raw %}
    ### V208: VariableShadowingCheck (WARNING)
    Fires when any key in `config.prompt.variables` matches a built-in name:
    `workspace`, `sheet_num`, `total_sheets`, `start_item`, `end_item`,
    `stage`, `instance`, `fan_count`, `total_stages`.
    User variables that shadow these will override the real values.
    Suggestion: "Rename variable '{name}' — it shadows the built-in {name}"
    {% endraw %}
    ### V209: MissingDisableMcpCheck (INFO)
    Fires when `config.backend.type == "claude_cli"` and
    `config.backend.disable_mcp is False`. MCP can cause deadlocks in
    unattended orchestration.
    Suggestion: "Set backend.disable_mcp: true to prevent MCP deadlocks"

    **Implementation requirements:**
    - Each class: `check_id` property, `severity` property, `description` property, `check()` method
    - Import from: `mozart.validation.base` (ValidationIssue, ValidationSeverity)
    - Import from: `mozart.validation.checks._helpers` (find_line_in_yaml)
    - Import from: `mozart.core.config` (JobConfig)
    - Use `find_line_in_yaml(raw_yaml, ...)` where useful for line numbers
    - Return `list[ValidationIssue]` (empty list if check passes)
    - Include helpful `suggestion` text on every issue
    - Include `metadata` dict with relevant keys for debugging

    **Output to:** {{ workspace }}/01-best-practice-checks.md

    Report: list of all 9 classes created, their check IDs, and a summary of
    what each detects. Include the full file path created.

    {% elif stage == 2 %}
