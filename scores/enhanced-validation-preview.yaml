    **Output to:** {{ workspace }}/02-wiring.md

    {% elif stage == 3 %}
    ╔══════════════════════════════════════════════════════════════════════════════╗
    ║  STAGE 3: TEST ALL 9 BEST-PRACTICE CHECKS                                ║
    ╚══════════════════════════════════════════════════════════════════════════════╝

