    **Modify** `src/mozart/validation/reporter.py` to add two methods to `ValidationReporter`:

    ### Method 1: `report_rendering_terminal(self, preview, verbose=False) -> None`

    The `preview` parameter type is `RenderingPreview` from `mozart.validation.rendering`.

    **Default (verbose=False):** Show sheet 1 only (representative).
    ```
    Rendering Preview (Sheet 1 of 5):
      Prompt:
      (Rich Panel with prompt snippet, dim border, expand=False)
      Validations (expanded for sheet 1):
        1. file_exists: /home/user/ws/output-1.md
        2. content_contains: /home/user/ws/output-1.md
    ```

    **Verbose (verbose=True):** Show all sheets with their metadata (stage, instance).

    Use Rich `Panel` for prompt snippets — dim border, `expand=False`.
    Show render errors in red. Show non-applicable validations as dimmed.

