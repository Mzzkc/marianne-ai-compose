    - Create YAML as a `dedent(""" ... """).strip()` string
    - Write to `tmp_path / "test.yaml"` and load via `JobConfig.from_yaml()`
    - Instantiate the check class directly and call `.check(config, path, yaml)`
    - Assert `len(issues)`, `issues[0].check_id`, `issues[0].severity`

    **Tests to write (~20 tests):**
    {% raw %}
    For V201 (JinjaInValidationPathCheck):
    - test_v201_clean_path_passes — path: "{workspace}/foo.md" produces no issues
    - test_v201_jinja_in_path_triggers — path: "{{ workspace }}/foo.md" produces V201

    For V202 (FormatSyntaxInTemplateCheck):
    - test_v202_jinja_syntax_passes — template with `{{ sheet_num }}` produces no issues
