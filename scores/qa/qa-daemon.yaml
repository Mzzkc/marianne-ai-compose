# ╔══════════════════════════════════════════════════════════════════════════════╗
# ║       QA DAEMON — Manager, IPC, Scheduler, Event Bus, Health, etc.         ║
# ║                                                                            ║
# ║  Adversarial testing overhaul for Mozart's daemon layer (20+ modules).     ║
# ║                                                                            ║
# ║  Stage 1: Audit existing tests — classify strong/weak/flaky/useless        ║
# ║  Stage 2 x3: Overhaul (fix flaky | property-based | adversarial edges)    ║
# ║  Stage 3: Merge parallel work, resolve conflicts                           ║
# ║  Stage 4: Coverage gate — verify >= 80%, write targeted gap tests          ║
# ║  Stage 5: Commit all changes                                               ║
# ║                                                                            ║
# ║  Requires: qa-foundation (hypothesis installed, conftest_adversarial.py)   ║
# ╚══════════════════════════════════════════════════════════════════════════════╝

name: "qa-daemon"
description: "Adversarial testing overhaul for daemon modules: manager, IPC, scheduler, event bus, health, monitor"

workspace: "/home/emzi/Projects/mozart-ai-compose/.qa-daemon-workspace"

workspace_lifecycle:
  archive_on_fresh: true
  max_archives: 3

backend:
  type: claude_cli
  skip_permissions: true
  working_directory: /home/emzi/Projects/mozart-ai-compose
  timeout_seconds: 3000
  output_format: json

cross_sheet:
  auto_capture_stdout: true
  max_output_chars: 4000
  lookback_sheets: 5

sheet:
  size: 1
  total_items: 5

  fan_out:
    2: 3

  dependencies:
    2: [1]
    3: [2]
    4: [3]
    5: [4]

parallel:
  enabled: true
  max_concurrent: 3

retry:
  max_retries: 2
  max_completion_attempts: 2
  completion_threshold_percent: 50

stale_detection:
  enabled: true
  idle_timeout_seconds: 1800

cost_limits:
  enabled: false

prompt:
  variables:
    preamble: |
      ╔══════════════════════════════════════════════════════════════════════════════╗
      ║  QA DAEMON — Adversarial Testing Overhaul                                  ║
      ║  Manager · IPC · Scheduler · Event Bus · Health · Monitor                  ║
      ╚══════════════════════════════════════════════════════════════════════════════╝

      **Project:** /home/emzi/Projects/mozart-ai-compose
      **Branch:** main (push directly)
      **Virtual env:** .venv

      ## Source Scope (ONLY touch tests for these modules)
      - `src/mozart/daemon/` — all modules: manager.py, scheduler.py, rate_coordinator.py,
        backpressure.py, learning_hub.py, semantic_analyzer.py, pgroup.py, monitor.py,
        registry.py, config.py, process.py, detect.py, health.py, output.py, types.py,
        event_bus.py, exceptions.py, task_utils.py, job_service.py, system_probe.py
      - `src/mozart/daemon/ipc/` — server.py, client.py, protocol.py, handler.py, errors.py
      - `src/mozart/daemon/profiler/` — if present

      ## Test Scope
      - All `tests/test_daemon_*.py` files (27 files)
      - New files you create in `tests/` for this module

      ## Shared Infrastructure (from qa-foundation)
      - `tests/conftest_adversarial.py` — hypothesis strategies, adversarial fixtures, strict_mock()
      - `tests/test_quality_gate.py` — quality standards reference

      CRITICAL RULES:
      1. Read actual source code before writing tests. Understand what the code does.
      2. Tests must test BEHAVIOR, not implementation. Ask: "Would this test fail if the behavior broke?"
      3. Use `from tests.conftest_adversarial import` for shared strategies.
      4. Every new test must have type hints.
      5. Run tests after every change: `pytest tests/test_daemon_*.py -x -q --timeout=60`
      6. Never use `git add .` — stage files explicitly.
      7. This is the largest module — prioritize the most important subsystems:
         IPC protocol, manager, event bus, scheduler.

    overhaul_types:
      1:
        name: "Fix Flaky & Weak Tests"
        directive: |
          Your job: Find and fix every flaky and weak test in the test scope.

          **Read the audit report at {{ workspace }}/01-audit.md first.** The audit
          classifies each test as strong/weak/flaky/useless. Focus on what the audit
          actually found — don't hunt for patterns that aren't there.

          For each test the audit classified as "flaky" or "weak", apply the
          appropriate fix based on the specific problem identified:

          **Common flaky patterns and their fixes:**
          - `asyncio.sleep(N)` for coordination → polling loop with deadline
          - `assert elapsed < N` where N < 30 → widen to `assert elapsed < 30.0`
          - Bare `MagicMock()` → `create_autospec(RealClass, instance=True)`
          - PID assumptions → mock `os.kill`
          - Order-dependent tests → isolate shared state in fixtures

          **Common weak patterns and their fixes:**
          - `assert isinstance(x, Type)` without value checks → add value assertions
          - `assert len(x) > 0` without content checks → assert specific content
          - No assertions at all → add meaningful assertions or delete if truly useless
          - Tests that mock the thing they're testing → rewrite to test behavior

          If the audit found problems not in these lists, fix them using your judgment.
          If a test is truly useless, delete it and document why in your report.

          With 27 test files, prioritize: IPC, manager, event bus, scheduler first.

          After EACH file modified, run:
          ```bash
          pytest <file> -x -q --timeout=60
          ```

      2:
        name: "Add Property-Based Tests"
        directive: |
          Your job: Write hypothesis @given tests for daemon-layer models and protocols.

          **Read the audit report at {{ workspace }}/01-audit.md first.**
          **Read `tests/conftest_adversarial.py` for available strategies.**

          Property-based test targets:

          1. **IPC protocol messages**: JSON-RPC request/response round-trips, message
             serialization/deserialization, error code ranges
          2. **Scheduler priority queues**: Priority ordering is maintained after insertions,
             fair-share allocation doesn't starve any job
          3. **Event bus subscriptions**: Subscribe → publish → receive for any event type,
             unsubscribe actually prevents delivery
          4. **DaemonConfig**: All config fields round-trip through model_dump/model_validate
          5. **Registry**: Job registration is idempotent, lookup after register always succeeds
          6. **Rate coordinator**: Rate limits are non-negative, cooldown periods decrease monotonically

          Use `@pytest.mark.property_based` on all hypothesis tests.
          Use `@settings(max_examples=50)` for CI speed.

          Create new file: `tests/test_daemon_property_based.py`

          After writing, run:
          ```bash
          pytest tests/test_daemon_property_based.py -v --timeout=120
          ```

      3:
        name: "Add Adversarial Edge Case Tests"
        directive: |
          Your job: Write adversarial tests that try to break the daemon layer.

          **Read the audit report at {{ workspace }}/01-audit.md for coverage gaps.**
          **Read `tests/conftest_adversarial.py` for adversarial fixtures.**

          Target areas:

          1. **IPC with malformed data:**
             - Truncated JSON, incomplete messages
             - Messages > 1MB
             - Valid JSON but invalid JSON-RPC structure
             - Concurrent connections sending interleaved bytes
             - Connection dropped mid-response

          2. **Scheduler edge cases:**
             - 0 or negative priorities
             - More jobs than semaphore slots
             - Job submitted after scheduler shutdown
             - All jobs cancelled simultaneously
             - Priority inversion scenarios

          3. **Event bus stress:**
             - 100 concurrent publish/subscribe coroutines
             - Subscriber that raises exceptions
             - Publish during unsubscribe
             - Event with None/empty payload
             - Subscribe to event type that never fires

          4. **Health check edge cases:**
             - Health check during conductor shutdown
             - Health check when all jobs are stuck
             - Health check with clock skew
             - Rapid health check polling (100/sec)

          5. **Manager edge cases:**
             - Duplicate job IDs
             - Job submitted after shutdown started
             - Cancel non-existent job
             - Submit job with invalid config
             - Concurrent submit + cancel of same job

          6. **Process group edge cases:**
             - Kill process group that doesn't exist
             - Zombie processes in group
             - Process group with PID 0
             - Cleanup during signal handler

          Use `@pytest.mark.adversarial` on all these tests.
          Use `pytest.mark.parametrize` extensively.

          Create new file: `tests/test_daemon_adversarial.py`

          After writing, run:
          ```bash
          pytest tests/test_daemon_adversarial.py -v --timeout=120
          ```

  template: |
    {{ preamble }}

    *Stage {{ stage }}/{{ total_stages }} ({{ ((stage / total_stages) * 100) | round }}%)*
    {% if fan_count > 1 %}*Instance {{ instance }}/{{ fan_count }}*{% endif %}

    {% if stage == 1 %}
    # Stage 1: Audit Existing Tests

    Read every test file in scope and classify each test function.

    **Test files to audit:**
    ```bash
    ls tests/test_daemon_*.py 2>/dev/null | wc -l
    ls tests/test_daemon_*.py 2>/dev/null
    ```

    With 27 files, batch your reads. Start with the most critical subsystems:
    IPC (protocol, server, client), manager, event bus, scheduler, then the rest.

    **For each test file**, read it and classify every `def test_*` function as:

    - **Strong**: Tests behavior with meaningful assertions, handles edge cases, no timing deps
    - **Weak**: Uses bare MagicMock, trivial assertions (`assert True`, `isinstance` only), tests implementation not behavior
    - **Flaky**: Uses `asyncio.sleep` for coordination, tight timing (`elapsed < 5`), PID assumptions
    - **Useless**: No assertions at all, or only checks import works

    **Also measure coverage:**
    ```bash
    cd /home/emzi/Projects/mozart-ai-compose
    .venv/bin/pytest tests/test_daemon_*.py -x -q --cov=mozart.daemon --cov-report=term-missing:skip-covered --timeout=120 2>&1 | tail -50
    ```

    **Output to:** {{ workspace }}/01-audit.md

    Format:
    ```markdown
    IMPLEMENTATION_COMPLETE: yes

    # Daemon Module Test Audit

    ## Coverage Summary
    | Source File | Coverage | Uncovered Lines |
    |-------------|----------|-----------------|

    ## Test Classification
    | Test File | Test Function | Classification | Reason |
    |-----------|---------------|----------------|--------|

    ## Summary
    - Total tests: N
    - Strong: N (X%)
    - Weak: N (X%)
    - Flaky: N (X%)
    - Useless: N (X%)

    ## Top Priority Fixes
    1. [Most impactful improvement]
    ...
    ```


    {% elif stage == 2 %}
    {% set task = overhaul_types[instance] %}

    # Stage 2: {{ task.name }}

    Read {{ workspace }}/01-audit.md for the audit results.

    {{ task.directive }}

    **PARALLEL STAGE:** You are instance {{ instance }} of {{ fan_count }}.
    - Instance 1: Fix flaky & weak tests (modifies existing test files)
    - Instance 2: Add property-based tests (creates new file)
    - Instance 3: Add adversarial edge cases (creates new file)

    If you need to modify a file another instance owns, note it in your output
    but don't touch it.

    **Output to:** {{ workspace }}/02-{{ task.name | lower | replace(" ", "-") | replace("&", "and") }}.md
    Include `IMPLEMENTATION_COMPLETE: yes` at the top.


    {% elif stage == 3 %}
    # Stage 3: Merge & Conflict Resolution

    Three parallel instances just modified tests independently. Make it all work together.

    Read all reports:
    - {{ workspace }}/02-fix-flaky-and-weak-tests.md
    - {{ workspace }}/02-add-property-based-tests.md
    - {{ workspace }}/02-add-adversarial-edge-case-tests.md

    **Step 1: Check for conflicts**
    ```bash
    cd /home/emzi/Projects/mozart-ai-compose
    git diff --stat
    ```

    **Step 2: Run the full module test suite**
    ```bash
    .venv/bin/pytest tests/test_daemon_*.py tests/test_daemon_property_based.py tests/test_daemon_adversarial.py -x -v --timeout=120 2>&1 | tail -30
    ```

    **Step 3: Fix any failures.** Common conflicts and resolution strategies:
    - If instance 1 changed an existing test that instance 2/3 imported or referenced,
      update the import/reference to match instance 1's changes.
    - If instance 2 or 3 created helpers that duplicate what instance 1 already fixed,
      remove the duplicate and use instance 1's version.
    - If two new test files have name collisions, rename the less specific one.
    - If tests fail because shared fixtures changed, update the tests to match.

    **Step 4: Run the quality gate to verify no flaky patterns remain**
    ```bash
    .venv/bin/pytest tests/test_quality_gate.py -v --timeout=60
    ```

    **Output to:** {{ workspace }}/03-merge.md
    Include `IMPLEMENTATION_COMPLETE: yes` at the top.


    {% elif stage == 4 %}
    # Stage 4: Coverage Gate

    Verify the module hits >= 80% coverage. Write targeted tests for any gaps.

    **Step 1: Measure coverage**
    ```bash
    cd /home/emzi/Projects/mozart-ai-compose
    .venv/bin/pytest tests/test_daemon_*.py tests/test_daemon_property_based.py tests/test_daemon_adversarial.py -x -q --cov=mozart.daemon --cov-report=term-missing --timeout=120 2>&1 | tail -50
    ```

    **Step 2: If any source file is below 80%**, read the uncovered lines and write
    targeted tests that exercise those specific code paths. Add them to the appropriate
    existing test file or create a new one.

    **Step 3: Re-run coverage to verify**

    Target: every source file >= 80%.

    **Output to:** {{ workspace }}/04-coverage.md
    Include `IMPLEMENTATION_COMPLETE: yes` at the top.
    Include before/after coverage table.


    {% elif stage == 5 %}
    # Stage 5: Commit All Changes

    **Step 1: Run full test suite to verify nothing regressed**
    ```bash
    cd /home/emzi/Projects/mozart-ai-compose
    .venv/bin/pytest tests/ -x --timeout=120 -q 2>&1 | tail -10
    ```

    **Step 2: Stage only test files modified by this score**
    ```bash
    git status --short | grep -E "test_.*\.py$"
    git add tests/test_daemon_property_based.py tests/test_daemon_adversarial.py
    # Also stage any modified existing test files (only if modified by this score)
    git diff --cached --stat
    ```

    **Step 3: Commit and push**
    ```bash
    git commit -m "test(daemon): adversarial overhaul — property-based + edge cases

    - Add hypothesis property-based tests for IPC protocol, scheduler, event bus
    - Add adversarial tests for malformed IPC, concurrent events, edge cases
    - Fix flaky patterns: replace asyncio.sleep with polling, widen timing bounds
    - Replace bare MagicMock() with create_autospec()
    - Coverage: daemon modules now >= 80%

    Co-Authored-By: Mozart AI Compose <noreply@mozart.ai>"

    git push
    ```

    **Output to:** {{ workspace }}/05-commit.md
    Include `IMPLEMENTATION_COMPLETE: yes` at the top.

    {% endif %}

validations:
  # Stage 1: Audit exists with substantive content
  - type: file_exists
    path: "{workspace}/01-audit.md"
    condition: "stage >= 1"
    description: "Audit report exists"

  - type: content_contains
    path: "{workspace}/01-audit.md"
    pattern: "IMPLEMENTATION_COMPLETE: yes"
    condition: "stage >= 1"
    description: "Audit marked complete"

  - type: content_regex
    path: "{workspace}/01-audit.md"
    pattern: "## Coverage Summary\\s+\\|"
    condition: "stage >= 1"
    description: "Audit has coverage table with data rows"

  - type: content_regex
    path: "{workspace}/01-audit.md"
    pattern: "## Test Classification\\s+\\|"
    condition: "stage >= 1"
    description: "Audit has classification table with data rows"

  # Stage 2: Per-instance reports
  - type: file_exists
    path: "{workspace}/02-fix-flaky-and-weak-tests.md"
    condition: "stage == 2 and instance == 1"
    description: "Flaky fix report exists"

  - type: file_exists
    path: "{workspace}/02-add-property-based-tests.md"
    condition: "stage == 2 and instance == 2"
    description: "Property-based test report exists"

  - type: file_exists
    path: "{workspace}/02-add-adversarial-edge-case-tests.md"
    condition: "stage == 2 and instance == 3"
    description: "Adversarial test report exists"

  # Stage 2: Instance 1 — existing tests pass AND changes were made
  - type: command_succeeds
    command: 'cd /home/emzi/Projects/mozart-ai-compose && .venv/bin/pytest tests/test_daemon_*.py -x -q --timeout=120 --tb=no --no-header 2>&1 | tail -1 | grep -qE "[0-9]+ passed"'
    condition: "stage == 2 and instance == 1"
    description: "Existing daemon tests pass after flaky fixes"
    timeout_seconds: 300

  - type: command_succeeds
    command: 'cd /home/emzi/Projects/mozart-ai-compose && git diff --name-only HEAD | grep -qE "tests/test_daemon_"'
    condition: "stage == 2 and instance == 1"
    description: "Instance 1 actually modified existing test files"
    stage: 2

  # Stage 2: Actual test files created with real content
  - type: file_exists
    path: "/home/emzi/Projects/mozart-ai-compose/tests/test_daemon_property_based.py"
    condition: "stage == 2 and instance == 2"
    description: "Property-based test file created"

  - type: file_exists
    path: "/home/emzi/Projects/mozart-ai-compose/tests/test_daemon_adversarial.py"
    condition: "stage == 2 and instance == 3"
    description: "Adversarial test file created"

  # Stage 2: Test files use required techniques
  - type: content_regex
    path: "/home/emzi/Projects/mozart-ai-compose/tests/test_daemon_property_based.py"
    pattern: "@given"
    condition: "stage == 2 and instance == 2"
    description: "Property-based tests use @given decorator"

  - type: content_regex
    path: "/home/emzi/Projects/mozart-ai-compose/tests/test_daemon_adversarial.py"
    pattern: "pytest\\.mark\\.adversarial"
    condition: "stage == 2 and instance == 3"
    description: "Adversarial tests use @pytest.mark.adversarial"

  # Stage 2: Minimum test count
  - type: command_succeeds
    command: 'cd /home/emzi/Projects/mozart-ai-compose && count=$(.venv/bin/pytest tests/test_daemon_property_based.py --collect-only -q --timeout=30 2>&1 | tail -1 | grep -oE "^[0-9]+") && test "$count" -ge 10'
    condition: "stage == 2 and instance == 2"
    description: "Property-based file has >= 10 tests"
    timeout_seconds: 120

  - type: command_succeeds
    command: 'cd /home/emzi/Projects/mozart-ai-compose && count=$(.venv/bin/pytest tests/test_daemon_adversarial.py --collect-only -q --timeout=30 2>&1 | tail -1 | grep -oE "^[0-9]+") && test "$count" -ge 10'
    condition: "stage == 2 and instance == 3"
    description: "Adversarial file has >= 10 tests"
    timeout_seconds: 120

  # Stage 2: Tests pass
  - type: command_succeeds
    command: 'cd /home/emzi/Projects/mozart-ai-compose && .venv/bin/pytest tests/test_daemon_property_based.py -x -q --timeout=120 --tb=no --no-header 2>&1 | tail -1 | grep -qE "[0-9]+ passed"'
    condition: "stage == 2 and instance == 2"
    description: "Property-based tests pass"
    timeout_seconds: 300

  - type: command_succeeds
    command: 'cd /home/emzi/Projects/mozart-ai-compose && .venv/bin/pytest tests/test_daemon_adversarial.py -x -q --timeout=120 --tb=no --no-header 2>&1 | tail -1 | grep -qE "[0-9]+ passed"'
    condition: "stage == 2 and instance == 3"
    description: "Adversarial tests pass"
    timeout_seconds: 300

  # Stage 3: Merge — all tests pass and quality gate holds
  - type: command_succeeds
    command: 'cd /home/emzi/Projects/mozart-ai-compose && .venv/bin/pytest tests/test_daemon_*.py tests/test_daemon_property_based.py tests/test_daemon_adversarial.py -x -q --timeout=120 --tb=no --no-header 2>&1 | tail -1 | grep -qE "[0-9]+ passed"'
    condition: "stage >= 3"
    description: "All daemon module tests pass"
    timeout_seconds: 600

  - type: command_succeeds
    command: 'cd /home/emzi/Projects/mozart-ai-compose && .venv/bin/pytest tests/test_quality_gate.py -x -q --timeout=60 --tb=no --no-header 2>&1 | tail -1 | grep -qE "[0-9]+ passed"'
    condition: "stage >= 3"
    description: "Quality gate meta-tests pass"
    timeout_seconds: 120
    stage: 2

  # Stage 4: Coverage gate
  - type: command_succeeds
    command: |
      cd /home/emzi/Projects/mozart-ai-compose && .venv/bin/pytest tests/test_daemon_*.py tests/test_daemon_property_based.py tests/test_daemon_adversarial.py -x -q --cov=mozart.daemon --cov-report=json:/tmp/qa-daemon-cov.json --timeout=120 --tb=no --no-header 2>&1 | tail -1 | grep -qE "[0-9]+ passed" && python3 -c "
      import json
      with open('/tmp/qa-daemon-cov.json') as f:
          data = json.load(f)
      pct = data.get('totals', {}).get('percent_covered', 0)
      assert pct >= 80, f'Coverage {pct:.1f}% < 80%'
      print(f'Coverage: {pct:.1f}% >= 80% PASSED')
      "
    condition: "stage >= 4"
    description: "Daemon module coverage >= 80%"
    timeout_seconds: 600
    stage: 2

  # Stage 5: Full suite passes and changes committed
  - type: command_succeeds
    command: 'cd /home/emzi/Projects/mozart-ai-compose && .venv/bin/pytest tests/ -x --timeout=120 -q --tb=no --no-header 2>&1 | tail -1 | grep -qE "[0-9]+ passed"'
    condition: "stage >= 5"
    description: "Full test suite passes"
    timeout_seconds: 900
    stage: 1

  - type: command_succeeds
    command: 'cd /home/emzi/Projects/mozart-ai-compose && test -z "$(git status --porcelain tests/)"'
    condition: "stage >= 5"
    description: "Test changes committed (no unstaged test files)"
    stage: 2
