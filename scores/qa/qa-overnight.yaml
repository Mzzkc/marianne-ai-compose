# ╔══════════════════════════════════════════════════════════════════════════════╗
# ║       QA OVERNIGHT — Long-Running Smoke Tests                              ║
# ║                                                                            ║
# ║  Tests Mozart end-to-end against a real conductor. Designed for cron.      ║
# ║                                                                            ║
# ║  Stage 1: Start conductor, verify health                                   ║
# ║  Stage 2: Submit basic job, wait for completion                            ║
# ║  Stage 3: Pause/resume cycle                                               ║
# ║  Stage 4: Concurrent job submission                                        ║
# ║  Stage 5: Error recovery with retries                                      ║
# ║  Stage 6: Crash recovery (kill -9, restart, resume)                        ║
# ║  Stage 7: Cleanup and orphan detection                                     ║
# ║  Stage 8: Generate report and notify on failure                            ║
# ║                                                                            ║
# ║  Total runtime: ~55 minutes                                                ║
# ║  Cron: 0 2 * * * mozart run scores/qa/qa-overnight.yaml                   ║
# ╚══════════════════════════════════════════════════════════════════════════════╝

name: "qa-overnight"
description: "Long-running smoke tests against real conductor — designed for nightly cron"

workspace: "/home/emzi/Projects/mozart-ai-compose/.qa-overnight-workspace"

workspace_lifecycle:
  archive_on_fresh: true
  max_archives: 7

backend:
  type: claude_cli
  skip_permissions: true
  working_directory: /home/emzi/Projects/mozart-ai-compose
  timeout_seconds: 900
  output_format: json

cross_sheet:
  auto_capture_stdout: true
  max_output_chars: 4000
  lookback_sheets: 3

sheet:
  size: 1
  total_items: 8

  dependencies:
    2: [1]
    3: [2]
    4: [3]
    5: [4]
    6: [5]
    7: [6]
    8: [7]

retry:
  max_retries: 1
  max_completion_attempts: 2
  completion_threshold_percent: 50

stale_detection:
  enabled: true
  idle_timeout_seconds: 1200

cost_limits:
  enabled: false

prompt:
  variables:
    preamble: |
      ╔══════════════════════════════════════════════════════════════════════════════╗
      ║  QA OVERNIGHT — Smoke Tests Against Real Conductor                         ║
      ╚══════════════════════════════════════════════════════════════════════════════╝

      **Project:** /home/emzi/Projects/mozart-ai-compose
      **Branch:** main (DO NOT push — this score only tests, never modifies code)
      **Virtual env:** .venv
      **Overnight workspace:** {{ workspace }}

      CRITICAL RULES:
      1. DO NOT modify any source code or test files.
      2. DO NOT push anything to git.
      3. All test artifacts go in {{ workspace }}/
      4. Clean up any conductor/jobs you start before exiting.
      5. Use `setsid` for conductor startup to prevent orphans.
      6. Log everything — this runs unattended.

      ## Smoke Test Job Config
      Use this minimal job config for testing. Write it to {{ workspace }}/smoke-test.yaml:
      ```yaml
      name: "smoke-test"
      description: "QA overnight smoke test job"
      workspace: "{{ workspace }}/smoke-run"
      backend:
        type: claude_cli
        skip_permissions: true
        working_directory: /home/emzi/Projects/mozart-ai-compose
        timeout_seconds: 120
        output_format: json
      sheet:
        size: 1
        total_items: 2
        dependencies:
          2: [1]
      retry:
        max_retries: 1
      cost_limits:
        enabled: false
      prompt:
        template: |
          Echo test stage {{ stage }}. Write "STAGE_{{ stage }}_COMPLETE" to {{ workspace }}/smoke-run/stage-{{ stage }}.txt
      validations:
        - type: file_exists
          path: "{{ workspace }}/smoke-run/stage-{sheet_num}.txt"
          description: "Stage output file exists"
      ```

  template: |
    {{ preamble }}

    *Stage {{ stage }}/{{ total_stages }}*

    {% if stage == 1 %}
    # Stage 1: Start Conductor & Verify Health

    **Step 1: Ensure no conductor is already running**
    ```bash
    mozart conductor-status 2>&1 || true
    mozart stop 2>&1 || true
    sleep 2
    ```

    **Step 2: Start a fresh conductor**
    ```bash
    setsid mozart start &
    sleep 5
    ```

    **Step 3: Verify health**
    ```bash
    mozart conductor-status
    ```

    Expected: conductor running, health OK.

    **Step 4: Record conductor PID**
    ```bash
    pgrep -f "mozart.*daemon" > {{ workspace }}/conductor.pid
    cat {{ workspace }}/conductor.pid
    ```

    **Output to:** {{ workspace }}/01-conductor.md
    Include `IMPLEMENTATION_COMPLETE: yes` at the top.
    Include conductor PID and health check output.


    {% elif stage == 2 %}
    # Stage 2: Submit Basic Job

    **Step 1: Write the smoke test config**
    Write the smoke-test.yaml config from the preamble to {{ workspace }}/smoke-test.yaml

    **Step 2: Validate the config**
    ```bash
    mozart validate {{ workspace }}/smoke-test.yaml
    ```

    **Step 3: Submit and wait**
    ```bash
    mozart run {{ workspace }}/smoke-test.yaml 2>&1 | tee {{ workspace }}/02-run.log
    ```

    **Step 4: Check result**
    ```bash
    mozart status smoke-test --workspace {{ workspace }}/smoke-run
    ls -la {{ workspace }}/smoke-run/
    ```

    Expected: job completes with status "completed", output files exist.

    **Output to:** {{ workspace }}/02-basic-job.md
    Include `IMPLEMENTATION_COMPLETE: yes` at the top.
    Include job status output.


    {% elif stage == 3 %}
    # Stage 3: Pause/Resume Cycle

    **Step 1: Create a new multi-sheet job config**
    Create {{ workspace }}/pause-test.yaml — 4 sheets, sequential, each writes a file.

    **Step 2: Submit the job**
    ```bash
    mozart run {{ workspace }}/pause-test.yaml 2>&1 &
    ```

    **Step 3: Wait for sheet 1 to complete, then pause**
    Poll `mozart status` until sheet 1 shows completed, then:
    ```bash
    mozart pause pause-test --workspace {{ workspace }}/pause-run
    ```

    **Step 4: Verify paused state**
    ```bash
    mozart status pause-test --workspace {{ workspace }}/pause-run
    ```
    Expected: status shows "paused".

    **Step 5: Resume and wait for completion**
    ```bash
    mozart resume pause-test --workspace {{ workspace }}/pause-run
    ```

    **Step 6: Verify all sheets completed**
    Expected: all 4 sheets completed, output files exist.

    **Output to:** {{ workspace }}/03-pause-resume.md
    Include `IMPLEMENTATION_COMPLETE: yes` at the top.


    {% elif stage == 4 %}
    # Stage 4: Concurrent Job Submission

    **Step 1: Create 3 independent job configs**
    Each job has 2 sheets that write to distinct directories.

    **Step 2: Submit all 3 simultaneously**
    ```bash
    mozart run {{ workspace }}/concurrent-1.yaml 2>&1 &
    mozart run {{ workspace }}/concurrent-2.yaml 2>&1 &
    mozart run {{ workspace }}/concurrent-3.yaml 2>&1 &
    ```

    **Step 3: Wait for all to complete**
    Poll `mozart list` until all 3 show completed.

    **Step 4: Verify no cross-contamination**
    Each job should only have written to its own workspace.

    **Output to:** {{ workspace }}/04-concurrent.md
    Include `IMPLEMENTATION_COMPLETE: yes` at the top.


    {% elif stage == 5 %}
    # Stage 5: Error Recovery with Retries

    **Step 1: Create a job that fails on first attempt**
    The job config should have `retry.max_retries: 2` and a validation that
    checks for a file. The first sheet's prompt should intentionally NOT create
    the file on the first attempt (instruct the agent to write "ATTEMPT_N" to a
    counter file, and only create the validation file on attempt 2+).

    This tests that Mozart's retry mechanism actually works.

    **Step 2: Submit and monitor**
    Watch for the retry cycle in the logs.

    **Step 3: Verify retry history**
    Check the checkpoint shows retry count > 0 and final status is success.

    **Output to:** {{ workspace }}/05-error-recovery.md
    Include `IMPLEMENTATION_COMPLETE: yes` at the top.


    {% elif stage == 6 %}
    # Stage 6: Crash Recovery

    **Step 1: Start a new long-running job**
    Submit a job with 3 sheets, each with a 60-second timeout.

    **Step 2: Wait for sheet 1 to complete**

    **Step 3: Kill the conductor**
    ```bash
    mozart stop --force 2>&1 || true
    sleep 3
    ```

    **Step 4: Verify conductor is dead**
    ```bash
    mozart conductor-status 2>&1 || echo "Conductor is down (expected)"
    ```

    **Step 5: Restart conductor**
    ```bash
    setsid mozart start &
    sleep 5
    mozart conductor-status
    ```

    **Step 6: Resume the job**
    ```bash
    mozart resume <job-id> --workspace <dir>
    ```

    **Step 7: Verify it resumes from sheet 2 (not sheet 1)**
    The checkpoint should show sheet 1 as completed, and execution should
    continue from sheet 2.

    **Output to:** {{ workspace }}/06-crash-recovery.md
    Include `IMPLEMENTATION_COMPLETE: yes` at the top.


    {% elif stage == 7 %}
    # Stage 7: Cleanup & Orphan Detection

    **Step 1: Check for orphan processes**
    ```bash
    pgrep -f "claude.*--print-model" 2>/dev/null | head -20 || echo "No orphans"
    ```

    **Step 2: Stop the conductor**
    ```bash
    mozart stop
    sleep 3
    ```

    **Step 3: Verify no processes remain**
    ```bash
    pgrep -f "mozart.*daemon" 2>/dev/null && echo "FAIL: conductor still running" || echo "OK: conductor stopped"
    pgrep -f "claude.*--print-model" 2>/dev/null && echo "FAIL: orphan Claude processes" || echo "OK: no orphans"
    ```

    **Step 4: Clean up workspace**
    Archive this run's artifacts:
    ```bash
    cp -r {{ workspace }} {{ workspace }}-$(date +%Y%m%d-%H%M%S)
    ```

    **Output to:** {{ workspace }}/07-cleanup.md
    Include `IMPLEMENTATION_COMPLETE: yes` at the top.
    Include orphan check results.


    {% elif stage == 8 %}
    # Stage 8: Generate Report

    **Step 1: Read all stage reports**
    Read {{ workspace }}/01-conductor.md through {{ workspace }}/07-cleanup.md

    **Step 2: Generate summary report**
    Create {{ workspace }}/overnight-report.md with:

    ```markdown
    # QA Overnight Report — {{ workspace }}
    Date: $(date -Iseconds)

    ## Results
    | Stage | Name | Status | Notes |
    |-------|------|--------|-------|
    | 1 | Conductor Start | PASS/FAIL | ... |
    | 2 | Basic Job | PASS/FAIL | ... |
    | 3 | Pause/Resume | PASS/FAIL | ... |
    | 4 | Concurrent Jobs | PASS/FAIL | ... |
    | 5 | Error Recovery | PASS/FAIL | ... |
    | 6 | Crash Recovery | PASS/FAIL | ... |
    | 7 | Cleanup | PASS/FAIL | ... |

    ## Overall: PASS/FAIL
    ## Issues Found
    - [List any failures or unexpected behavior]
    ```

    **Step 3: If any stage failed, create a notification file**
    ```bash
    # Check if any stage failed
    if grep -l "FAIL" {{ workspace }}/overnight-report.md; then
      echo "OVERNIGHT_FAILURE: $(date -Iseconds)" > {{ workspace }}/FAILURE_NOTIFICATION
    fi
    ```

    **Output to:** {{ workspace }}/08-report.md
    Include `IMPLEMENTATION_COMPLETE: yes` at the top.

    {% endif %}

validations:
  # Stage 1: Conductor running
  - type: file_exists
    path: "{workspace}/01-conductor.md"
    condition: "stage >= 1"
    description: "Conductor stage report exists"

  - type: content_contains
    path: "{workspace}/01-conductor.md"
    pattern: "IMPLEMENTATION_COMPLETE: yes"
    condition: "stage >= 1"
    description: "Conductor stage marked complete"

  # Stage 2: Basic job completed
  - type: file_exists
    path: "{workspace}/02-basic-job.md"
    condition: "stage >= 2"
    description: "Basic job report exists"

  - type: content_contains
    path: "{workspace}/02-basic-job.md"
    pattern: "IMPLEMENTATION_COMPLETE: yes"
    condition: "stage >= 2"
    description: "Basic job stage marked complete"

  # Stage 3-7: Reports exist
  - type: file_exists
    path: "{workspace}/03-pause-resume.md"
    condition: "stage >= 3"
    description: "Pause/resume report exists"

  - type: file_exists
    path: "{workspace}/04-concurrent.md"
    condition: "stage >= 4"
    description: "Concurrent jobs report exists"

  - type: file_exists
    path: "{workspace}/05-error-recovery.md"
    condition: "stage >= 5"
    description: "Error recovery report exists"

  - type: file_exists
    path: "{workspace}/06-crash-recovery.md"
    condition: "stage >= 6"
    description: "Crash recovery report exists"

  - type: file_exists
    path: "{workspace}/07-cleanup.md"
    condition: "stage >= 7"
    description: "Cleanup report exists"

  # Stage 7: Conductor actually stopped
  - type: command_succeeds
    command: '! pgrep -f "mozart.*daemon" > /dev/null 2>&1'
    condition: "stage >= 7"
    description: "No conductor process running after cleanup"
    stage: 2

  # Stage 8: Final report
  - type: file_exists
    path: "{workspace}/overnight-report.md"
    condition: "stage >= 8"
    description: "Overnight report generated"

  - type: content_regex
    path: "{workspace}/overnight-report.md"
    pattern: "## Overall:"
    condition: "stage >= 8"
    description: "Report has overall status"
