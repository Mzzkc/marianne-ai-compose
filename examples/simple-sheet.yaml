# Example: Simple Sheet Job
# A minimal Mzt configuration to get started
#
# Usage:
#   mzt run examples/simple-sheet.yaml
#   mzt status simple-sheet
#   mzt resume simple-sheet

name: "simple-sheet"
description: "Minimal example showing core Marianne features"

workspace: "../workspaces/simple-workspace"

# Instrument: which AI tool to use (default: claude-code)
# See `mzt instruments list` for all available instruments.
instrument: claude-code
instrument_config:
  timeout_seconds: 600       # 10 minutes per sheet

  # Optional: Model selection (omit to use Claude Code's default)
  # model: claude-sonnet-4-20250514

sheet:
  size: 5          # Items per sheet
  total_items: 10  # Total items = 2 sheets

prompt:
  template: |
    Process sheet {{ sheet_num }} of {{ total_sheets }}.
    Items: {{ start_item }} to {{ end_item }}

    Create a file at {{ workspace }}/sheet{{ sheet_num }}.md summarizing your work.

retry:
  max_retries: 2
  base_delay_seconds: 10

validations:
  - type: file_exists
    path: "{workspace}/sheet{sheet_num}.md"
    description: "Sheet output file must exist"

state_backend: json
